              schema:
                $ref: '#/components/schemas/Error'

  /ramp/agreements/customer-agreement:
    post:
      tags:
        - Agreements
      summary: Accept customer agreement
      description: |
        Records the user's acceptance of the Customer Agreement, which governs the use of
        Etherfuse's on/off ramp services.

        **Authentication:** The presigned URL serves as the authentication mechanism for the end user.
        This endpoint must be called by or on behalf of the user who will be bound by this agreement.

        **Legal effect:** By calling this endpoint with a valid presigned URL, the user agrees to
        the terms governing fiat-to-crypto and crypto-to-fiat transactions, including fees,
        settlement times, and liability provisions.

        **Optional customer info:** When using programmatic KYC, you may omit the `customerInfo`
        field since identity data was already submitted via the KYC endpoints.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerAgreementPayload'
      responses:
        '200':
          description: Customer agreement acceptance recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgreementResponse'
        '400':
          description: Invalid or expired presigned URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /ramp/quote:
    post:
      tags:
        - Quotes
      summary: Get quote for conversion
      description: |
        Retrieves a quote for converting between assets. Supports three quote types:
        - **Onramp**: fiat to crypto (sourceAsset: fiat currency code, targetAsset: asset identifier)
        - **Offramp**: crypto to fiat (sourceAsset: asset identifier, targetAsset: fiat currency code)
        - **Swap**: crypto to crypto (sourceAsset: asset identifier, targetAsset: asset identifier)

        **Finding supported assets:** Use the `/ramp/assets` endpoint to get a list of supported assets for quotes, ramps, and swaps. This returns a non-exhaustive list of common assets that a specific wallet would likely want to use, along with their `identifier` values.

        Crypto assets must be specified using asset identifiers in the format `CODE:ISSUER` (e.g., `USDC:GA5ZSEJYB37JRC5AVCIA5MOP4RHTM335X2KGX3IHOJAPP5RE34K4KZVN`). Use the `identifier` field from the `/ramp/assets` response. Fiat currencies use standard currency codes (e.g., `MXN`).

        The quote includes exchange rates, fees, and expiration information.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuoteRequest'
      responses:
        '200':
          description: Quote retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteResponse'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /ramp/order-preview:
    post:
      tags:
        - Orders
      summary: Preview order details
      description: Calculates and returns preview details for an order
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderPreviewPayload'
      responses:
        '200':
          description: Order preview generated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  amountFiat:
                    type: number
                    format: decimal
                    description: Amount in fiat currency
                  amountCrypto:
                    type: number
                    format: decimal
                    description: Amount in crypto currency
                  direction:
                    type: string
                    enum: [onramp, offramp]
                    description: Transaction direction
                  settlementTime:
                    type: string
                    description: Estimated settlement time
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /ramp/order:
    post:
      tags:
        - Orders
      summary: Create a new order
      description: |
        Creates a new order for crypto/fiat conversion using a previously created quote.

        **Flow:**
        1. First, call `/ramp/quote` to get pricing and create a quote
        2. Then, call this endpoint with the `quoteId` to execute the order

        The order inherits the blockchain, direction (onramp/offramp), and amounts from the quote.
        Quotes expire after 2 minutes, so create the order promptly after getting the quote.

        **Wallet resolution:** Provide either `publicKey` or `cryptoWalletId` (or both). When `cryptoWalletId` is provided, the wallet is resolved by UUID and `publicKey` becomes optional.

        For onramps, the bank account must belong to your organization or a child organization.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderPayload'
      responses:
        '200':
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateOrderResponse'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: A pending onramp order already exists for this bank account and amount
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /ramp/order/{order_id}/regenerate_tx:
    post:
      tags:
        - Orders
      summary: Regenerate transaction
      description: |
        Regenerates a pre-built transaction for an order.

        **Offramp orders** (status: Created): The new transaction will be sent over the webhook asynchronously. Returns HTTP 202 Accepted.

        **Stellar onramp orders with claimable balances** (status: Completed): If the stored claim transaction has a stale sequence number (e.g., the user transacted on Stellar before claiming), this endpoint rebuilds the unsigned XDR with a fresh sequence number and returns it synchronously. The order's `stellarClaimTransaction` field is also updated. Returns HTTP 200 with the fresh XDR in the response body.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the order to regenerate the transaction for
      responses:
        '200':
          description: |
            Stellar claim transaction regenerated successfully. The fresh unsigned XDR is returned in the response body and stored on the order.
          content:
            application/json:
              schema:
                type: object
                properties:
                  stellarClaimTransaction:
                    type: string
                    description: Base64-encoded unsigned XDR for the claim transaction (ChangeTrust + ClaimClaimableBalance)
        '202':
          description: Offramp transaction regeneration request accepted. The new transaction will arrive via webhook.

  /ramp/swap:
    post:
      tags:
        - Swap
      summary: Swap assets
      description: |
        Swaps two different crypto assets. This endpoint is asynchronous and returns an HTTP 200 OK with an empty body.

        **Flow:**
        1. First, call `/ramp/quote` with `quoteAssets.type: "swap"` to get pricing
        2. Then, call this endpoint with the `quoteId` to initiate the swap
        3. Listen for `swap_updated` webhook events to track swap progress and receive the transaction to sign

        **Webhook Response:** Since this endpoint returns an empty body, you must use webhooks to receive swap updates. Register a webhook for the `swap_updated` event type via [POST /ramp/webhook](/api-reference/webhooks/create-webhook) to receive `SwapResponse` payloads as the swap progresses through statuses: `swap_created` → `swap_funded` → `swap_completed` (or `swap_failed`).

        See the [Webhooks documentation](/api-reference/webhooks/create-webhook) for setup instructions and the webhook payload structure below.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SwapPayload'
      responses:
        '200':
          description: |
            Swap initiated successfully. The response body is empty.

            Subscribe to `swap_updated` webhooks to receive swap progress updates with the following payload:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SwapResponse'
              example:
                orderId: '123e4567-e89b-12d3-a456-426614174000'
                customerId: '34fcc67a-2454-4578-8435-e2bf03b4dc30'
                sendTransaction: 'AQAAAA...encoded_tx'
                sendTransactionHash: ''
                status: 'created'
                createdAt: '2025-01-15T10:00:00Z'
                updatedAt: '2025-01-15T10:00:00Z'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /ramp/swap/{order_id}/regenerate_tx:
    post:
      tags:
        - Swap
      summary: Regenerate swap transaction
      description: |
        Regenerates a transaction for a swap.
        Useful for cases where the transaction was not submitted prior to expiration.
        The updated transaction will be returned via the swap_updated webhook.
        Returns HTTP 202 Accepted if successful.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the swap order to regenerate the transaction for
      responses:
        '202':
          description: Transaction regeneratation request has been accepted
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

