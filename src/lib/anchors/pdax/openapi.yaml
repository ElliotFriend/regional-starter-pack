openapi: 3.2.0
info:
  title: PDAX Institutions API
  description: PDAX API for Institutions - fiat/crypto conversion, deposits, withdrawals, and balance management.
  version: 1.0.0
  license:
    name: Proprietary
servers:
  - url: https://services.pdax.ph/api/pdax-api
    description: Production
  - url: https://stage.services.sandbox.pdax.ph/api/pdax-api
    description: Stage / Sandbox
security:
  - bearerAuth: []
    idToken: []
tags:
  - name: Authentication
  - name: Balances
  - name: Deposit and Withdrawal check
  - name: Funding
  - name: Trade
  - name: Webhook
  - name: Withdrawals
paths:
  /pdax-institution/v1/login:
    post:
      summary: POST Login
      tags:
        - Authentication
      operationId: post_login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  description: Email address of PDAX account
                password:
                  type: string
                  description: Password of PDAX account
              required:
                - username
                - password
      responses:
        '200':
          description: Successful response (multiple variants)
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      email:
                        type: string
                        description: Email address of PDAX account
                      username:
                        type: string
                        description: ID number of PDAX account
                      groups:
                        type: array
                        description: List of groups user belongs to
                      token_type:
                        type: string
                        description: Type of authentication token (e.g., "Bearer")
                      preferred_mfa:
                        type: string
                        description: MFA preference status (e.g., "NOT_SET", "SOFTWARE_TOKEN_MFA")
                      expiry:
                        type: number
                        description: Token validity period in seconds
                      access_token:
                        type: string
                        description: JWT token for API authorization
                      id_token:
                        type: string
                        description: JWT token for user identity
                      refresh_token:
                        type: string
                        description: Token to refresh authentication without reauthentication
                    title: Schema of Response Payload (Without MFA Setup)
                  - type: object
                    properties:
                      code:
                        type: string
                        description: Response code from authentication service
                      message:
                        type: string
                        description: Descriptive message about the MFA challenge
                      challenge_name:
                        type: string
                        description: Type of challenge required (e.g., "SOFTWARE_TOKEN_MFA")
                      session:
                        type: string
                        description: Session token for completing the MFA challenge
                    title: Schema of Response Payload (With MFA Setup)
              example:
                email: example@gmail.com
                username: 96a8c8b5-8fee-40c9-9242-a5cd172e9a96
                groups:
                  - exchange_user
                token_type: Bearer
                preferred_mfa: SOFTWARE_TOKEN_MFA
                expiry: 600
                access_token: eyJraWQiOiJ4UjJ2U1A2
                id_token: eyJraWQiOiJsQzlPbldQV2ZX
                refresh_token: eyJjdHkiOiJKV1QiLCJ
        '400':
          $ref: '#/components/responses/PdaxError400'
        '500':
          $ref: '#/components/responses/PdaxError500'
        '503':
          $ref: '#/components/responses/PdaxError503'
  /pdax-institution/v1/login/otp:
    post:
      summary: POST OTP
      tags:
        - Authentication
      operationId: post_otp
      description: This endpoint is required if you enable MFA on your account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session:
                  type: string
                  description: MFA session token
                username:
                  type: string
                  description: Email address of PDAX account
                otp:
                  type: string
                  description: One-time password code
              required:
                - session
                - username
                - otp
      responses:
        '200':
          description: Schema of Response Payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  email:
                    type: string
                    description: Email address of PDAX account
                  username:
                    type: string
                    description: ID number of PDAX account
                  groups:
                    type: array
                    description: List of groups user belongs to
                  token_type:
                    type: string
                    description: Type of authentication token (e.g., "Bearer")
                  preferred_mfa:
                    type: string
                    description: MFA preference status (e.g., "SOFTWARE_TOKEN_MFA")
                  expiry:
                    type: number
                    description: Token validity period in seconds
                  access_token:
                    type: string
                    description: JWT token for API authorization
                  id_token:
                    type: string
                    description: JWT token for user identity
                  refresh_token:
                    type: string
                    description: Token to refresh authentication without reauthentication
              example:
                email: example@gmail.com
                username: 96a8c8b5-8fee-40c9-9242-a5cd172e9a96
                groups:
                  - exchange_user
                token_type: Bearer
                preferred_mfa: SOFTWARE_TOKEN_MFA
                expiry: 600
                access_token: eyJraWQiOiJ4UjJ2U1A2
                id_token: eyJraWQiOiJsQzlPbldQV2ZX
                refresh_token: eyJjdHkiOiJKV1QiLCJ
        '400':
          $ref: '#/components/responses/PdaxError400'
        '500':
          $ref: '#/components/responses/PdaxError500'
        '503':
          $ref: '#/components/responses/PdaxError503'
  /pdax-institution/v1/refresh-token:
    put:
      summary: PUT Refresh Token
      tags:
        - Authentication
      operationId: put_refresh_token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  description: Email address of PDAX account
                refreshToken:
                  type: string
                  description: Token for refresh session
              required:
                - username
                - refreshToken
      responses:
        '200':
          description: Schema of Response Payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  email:
                    type: string
                    description: Email address of PDAX account
                  username:
                    type: string
                    description: ID number of PDAX account
                  groups:
                    type: array
                    description: List of groups user belongs to
                  token_type:
                    type: string
                    description: Type of authentication token (e.g., "Bearer")
                  preferred_mfa:
                    type: string
                    description: MFA preference status (e.g., "NOT_SET")
                  expiry:
                    type: number
                    description: Token validity period in seconds
                  access_token:
                    type: string
                    description: JWT token for API authorization
                  id_token:
                    type: string
                    description: JWT token for user identity
                  refresh_token:
                    type: string
                    description: Token to refresh authentication without reauthentication
              example:
                email: test@pdax.ph
                username: 48e0fe9e-0724-4b80-9eb7-c61b53cd7346
                groups:
                  - insti_user
                token_type: Bearer
                preferred_mfa: NOT_SET
                expiry: 600
                access_token: eyJraWQiOiJwTXRndmx1UGQ1ZG5YK2U1MXNLQUFSSUpiTW00TnA5SzFUdlZDK0xLVmY4PSIsImFsZyI6IlJTMjU2In0.
                id_token: eyJraWQiOiJ6dU5uUkVqVmNpUTZ5ektqZEhUOVZoZGZtUzdSSkpzQjQ4ZUZ3S04wdUxZPSIsImFsZyI6IlJTMjU2In0
                refresh_token: eyJjdHkiOiJKV1QiLCJlbmMiOiJBMjU2R0NNIiwiYWxnIjoiUlNBLU9BRVAifQ.
        '400':
          $ref: '#/components/responses/PdaxError400'
        '500':
          $ref: '#/components/responses/PdaxError500'
        '503':
          $ref: '#/components/responses/PdaxError503'
  /pdax-institution/v1/trade/price:
    get:
      summary: GET Indicative Quote
      tags:
        - Trade
      operationId: get_indicative_quote
      description: Get a price quotation for the selected cryptopair.
      security:
        - bearerAuth: []
          idToken: []
      parameters:
        - name: quote_currency
          in: query
          schema:
            $ref: '#/components/schemas/Token'
          description: The crypto asset you want to buy or sell . Supported trading pairs can be found here
          required: true
        - name: base_currency
          in: query
          schema:
            type: string
            enum:
              - PHP
          description: PHP asset
          required: true
        - name: side
          in: query
          schema:
            type: string
          description: Counterparty action -- buy or sell
          required: true
        - name: base_quantity
          in: query
          schema:
            type: string
          description: Quantity to buy or sell.   Note:Quantity step rules apply. For more information, see here
          required: true
      responses:
        '200':
          description: Schema of Response Payload
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          quote_currency:
                            type: string
                            description: The crypto asset you want to buy or sell . Supported trading pairs can be found here
                          base_currency:
                            type: string
                            description: PHP asset
                          side:
                            type: string
                            description: Counterparty action -- buy or sell
                          base_quantity:
                            type: string
                            description: Quantity of the asset you are buying or selling
                          price:
                            type: number
                            description: Quoted unit price
                          total_amount:
                            type: number
                            description: Total amount
              example:
                data:
                  quote_currency: USDC
                  base_currency: PHP
                  side: sell
                  base_quantity: '100'
                  price: 55
                  total_amount: 5500
                status: success
        '400':
          $ref: '#/components/responses/PdaxError400'
        '401':
          $ref: '#/components/responses/PdaxError401'
        '500':
          $ref: '#/components/responses/PdaxError500'
        '503':
          $ref: '#/components/responses/PdaxError503'
      deprecated: true
  /pdax-institution/v1/trade/quote:
    post:
      summary: POST Firm Quote
      tags:
        - Trade
      operationId: post_firm_quote
      description:
        Firm quotes shall be used in placing orders. The API Service shall fill the order parameters as indicated
        in this endpoint and the quote response shall be served in full.
      security:
        - bearerAuth: []
          idToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                quote_currency:
                  $ref: '#/components/schemas/Token'
                  description: The crypto asset you want to buy or sell . Supported trading pairs can be found here
                base_currency:
                  type: string
                  enum:
                    - PHP
                  description: PHP asset
                side:
                  type: string
                  description: Counterparty action -- buy or sell
                base_quantity:
                  type: string
                  description: Quantity to buy or sell.   Note:Quantity step rules apply. For more information, see here
              required:
                - quote_currency
                - base_currency
                - side
                - base_quantity
      responses:
        '200':
          description: Schema of Response Payload
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          quote_id:
                            type: string
                            description: Firm quote reference ID
                          expires_at:
                            type: string
                            description: Quote validity in ISO timestamp
                          quote_currency:
                            type: string
                            description: The crypto asset you want to buy or sell . Supported trading pairs can be found here
                          base_currency:
                            type: string
                            description: PHP asset
                          side:
                            type: string
                            description: Counterparty action -- buy or sell
                          base_quantity:
                            type: number
                            description: Quantity of the asset you are buying or selling
                          price:
                            type: number
                            description: Quoted unit price
                          total_amount:
                            type: number
                            description: Total amount
              example:
                data:
                  quote_id: 0188b945-cbfa-7b8b-9fea-bfcc2ac25c8c
                  expires_at: '2023-06-14T09:41:13.423874Z'
                  quote_currency: USDC
                  base_currency: PHP
                  side: sell
                  base_quantity: 100
                  price: 55
                  total_amount: 5500
                status: success
        '400':
          $ref: '#/components/responses/PdaxError400'
        '401':
          $ref: '#/components/responses/PdaxError401'
        '500':
          $ref: '#/components/responses/PdaxError500'
        '503':
          $ref: '#/components/responses/PdaxError503'
      deprecated: true
  /pdax-institution/v2/trade/price:
    get:
      summary: GET Indicative Quote v2
      tags:
        - Trade
      operationId: get_indicative_quote_v2
      description: Get a price quotation for the selected cryptopair.
      security:
        - bearerAuth: []
          idToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                side:
                  type: string
                  description: Counterparty action -- buy or sell
                quote_currency:
                  $ref: '#/components/schemas/Token'
                  description: The crypto asset you want to buy or sell . Supported trading pairs can be found here
                base_currency:
                  type: string
                  enum:
                    - PHP
                  description: PHP asset
                currency:
                  $ref: '#/components/schemas/Token'
                  description: The currency of which you want to receive
                quantity:
                  type: string
                  description: Quantity to buy or sell.   Note:Quantity step rules apply. For more information, see here
              required:
                - side
                - quote_currency
                - base_currency
                - currency
                - quantity
      responses:
        '200':
          description: Schema of Response Payload
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          base_currency:
                            type: string
                            description: PHP asset
                          quote_currency:
                            type: string
                            description: The crypto asset you want to buy or sell. Supported trading pairs can be found here
                          side:
                            type: string
                            description: Counterparty action -- buy or sell
                          base_quantity:
                            type: number
                            description: Quantity of the asset you are buying or selling
                          price:
                            type: number
                            description: Quoted unit price
                          total_amount:
                            type: number
                            description: Total amount
              example:
                data:
                  base_currency: PHP
                  quote_currency: USDC
                  side: buy
                  base_quantity: 17.18
                  price: 58.196
                  total_amount: 1000
                status: success
        '400':
          $ref: '#/components/responses/PdaxError400'
        '401':
          $ref: '#/components/responses/PdaxError401'
        '500':
          $ref: '#/components/responses/PdaxError500'
        '503':
          $ref: '#/components/responses/PdaxError503'
  /pdax-institution/v2/trade/quote:
    post:
      summary: POST Firm Quote v2
      tags:
        - Trade
      operationId: post_firm_quote_v2
      description: Get a price quotation for the selected cryptopair.
      security:
        - bearerAuth: []
          idToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                side:
                  type: string
                  description: Counterparty action -- buy or sell
                quote_currency:
                  $ref: '#/components/schemas/Token'
                  description: The crypto asset you want to buy or sell . Supported trading pairs can be found here
                base_currency:
                  type: string
                  enum:
                    - PHP
                  description: PHP asset
                currency:
                  $ref: '#/components/schemas/Token'
                  description: The currency of which you want to receive
                quantity:
                  type: string
                  description: Quantity to buy or sell.   Note:Quantity step rules apply. For more information, see here
              required:
                - side
                - quote_currency
                - base_currency
                - currency
                - quantity
      responses:
        '200':
          description: Schema of Response Payload
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          quote_id:
                            type: string
                            description: Firm quote reference ID
                          expires_at:
                            type: string
                            description: Quote validity in ISO timestamp
                          base_currency:
                            type: string
                            description: PHP asset
                          quote_currency:
                            type: string
                            description: The crypto asset you want to buy or sell. Supported trading pairs can be found here
                          side:
                            type: string
                            description: Counterparty action -- buy or sell
                          base_quantity:
                            type: number
                            description: Quantity of the asset you are buying or selling
                          price:
                            type: number
                            description: Quoted unit price
                          total_amount:
                            type: number
                            description: Total amount
              example:
                data:
                  quote_id: 018fa0b8-b6e0-70e7-ad7e-1a9803695a86
                  expires_at: '2024-05-22T14:33:46.111Z'
                  base_currency: PHP
                  quote_currency: USDC
                  side: buy
                  base_quantity: 17.18
                  price: 58.196
                  total_amount: 1000
                status: success
        '400':
          $ref: '#/components/responses/PdaxError400'
        '401':
          $ref: '#/components/responses/PdaxError401'
        '500':
          $ref: '#/components/responses/PdaxError500'
        '503':
          $ref: '#/components/responses/PdaxError503'
  /pdax-institution/v1/trade:
    post:
      summary: POST Order
      tags:
        - Trade
      operationId: post_order
      description:
        Place a market order using the firm quote reference. To check if the order has been completed, use the
        Get Order Status endpoint.
      security:
        - bearerAuth: []
          idToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                quote_id:
                  type: string
                  description: Firm quote reference ID
                side:
                  type: string
                  description: Describes the side of the trade; this is dependent on the value of the side from Get Firm Quote
                idempotency_id:
                  type: string
                  description:
                    'Id of the request made. You may generate an idempotency id by using uuid ver 4 format  Sample
                    here: https://www.uuidgenerator.net/version4'
              required:
                - quote_id
                - side
                - idempotency_id
      responses:
        '200':
          description: Schema of Response Payload
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          order_id:
                            type: number
                            description: Id of the order
                          status:
                            type: string
                            description: 'Possible Values : successful, failed'
                          quote_currency:
                            type: string
                            description:
                              If side is 'Buy' Quote currency is the asset you want to receive If side is 'Sell'
                              Quote currency is the asset you want to sell
                          base_currency:
                            type: string
                            description:
                              If side is 'Buy' Base currency is the asset you want to sell If side is 'Sell' Base
                              currency is the asset you want to receive
                          side:
                            type: string
                            description: Counterparty side
                          base_quantity:
                            type: number
                            description: Order quantity as per firm quote
                          price:
                            type: number
                            description: Quoted unit price
                          total_amount:
                            type: number
                            description: Total amount
              example:
                data:
                  order_id: 122121
                  status: successful
                  quote_currency: USDC
                  base_currency: PHP
                  side: sell
                  base_quantity: 100
                  price: 55
                  total_amount: 5500
                status: success
        '400':
          $ref: '#/components/responses/PostOrderError400'
        '401':
          $ref: '#/components/responses/PdaxError401'
        '500':
          $ref: '#/components/responses/PostOrderError500'
        '503':
          $ref: '#/components/responses/PdaxError503'
  /pdax-institution/v1/orders/{order_id}:
    get:
      summary: GET Order Status
      tags:
        - Trade
      operationId: get_order_status
      description: Use this endpoint to verify the status of your order.
      security:
        - bearerAuth: []
          idToken: []
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: string
          description: Order ID returned from Post Order endpoint
      responses:
        '200':
          description: Schema of Response Payload
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          order_id:
                            type: number
                            description: Order id
                          status:
                            type: string
                            description: 'Possible Values : SUCCESSFUL, FAILED'
                          quote_currency:
                            type: string
                            description:
                              If side is 'Buy' Quote currency is the asset you want to receive If side is 'Sell'
                              Quote currency is the asset you want to sell
                          base_currency:
                            type: string
                            description:
                              If side is 'Buy' Base currency is the asset you want to sell If side is 'Sell' Base
                              currency is the asset you want to receive
                          side:
                            type: string
                            description: Counterparty side
                          base_quantity:
                            type: number
                            description: Order quantity as per firm quote
                          price:
                            type: number
                            description: Quoted unit price
                          total_amount:
                            type: number
                            description: Indicative total price inclusive of fees
              example:
                data:
                  order_id: '122121'
                  status: SUCCESSFUL
                  quote_currency: USDC
                  base_currency: PHP
                  side: sell
                  base_quantity: 100
                  price: 55
                  total_amount: 5500
                status: success
        '400':
          $ref: '#/components/responses/PdaxError400'
        '401':
          $ref: '#/components/responses/PdaxError401'
        '500':
          $ref: '#/components/responses/PdaxError500'
        '503':
          $ref: '#/components/responses/PdaxError503'
  /pdax-institution/v1/crypto/deposit:
    get:
      summary: Get Wallet (for Crypto Deposits)
      tags:
        - Funding
      operationId: get_wallet__for_crypto_deposits
      description: Deposit into your crypto wallet using the address returned by this endpoint.
      security:
        - bearerAuth: []
          idToken: []
      parameters:
        - name: currency
          in: query
          schema:
            $ref: '#/components/schemas/Token'
          description: Currency symbol including network of crypto token  e.g USDCXLM
          required: true
      responses:
        '200':
          description: Schema of Response Payload
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          currency:
                            type: string
                            description: Currency symbol
                          address:
                            type: string
                            description: Wallet address
                          tag:
                            type: string
                            description: Address tag or memo
              example:
                data:
                  currency: USDCXLM
                  address: GA54SPC34JL3I57ENALTO2V26XOFFG4VGQLFQXDGF6KJ5TJY7ODY56ST
                  tag: '123123123'
        '400':
          $ref: '#/components/responses/PdaxError400'
        '401':
          $ref: '#/components/responses/PdaxError401'
        '500':
          $ref: '#/components/responses/PdaxError500'
        '503':
          $ref: '#/components/responses/PdaxError503'
  /pdax-institution/v1/fiat/deposit:
    post:
      summary: POST Fiat In (for Fiat Deposits)
      tags:
        - Funding
      operationId: post_fiat_in__for_fiat_deposits
      security:
        - bearerAuth: []
          idToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: string
                  description: Amount to be sent to beneficiary
                method:
                  $ref: '#/components/schemas/FiatInMethod'
                identifier:
                  type: string
                  description: Unique identifier supplied by client
                sender_first_name:
                  type: string
                  description: Sender first name
                sender_middle_name:
                  type: string
                  description: Sender middle name
                sender_last_name:
                  type: string
                  description: Sender last name
                sender_country_origin:
                  $ref: '#/components/schemas/Country'
                  description: Where the sender is sending the funds from
                sender_address_line_one:
                  type: string
                  description: Address line 1
                sender_address_line_two:
                  type: string
                  description: Address line 2
