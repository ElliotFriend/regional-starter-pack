  /pdax-institution/v1/fiat/transactions:
    get:
      summary: GET Fiat Transactions
      tags:
        - Deposit and Withdrawal check
      operationId: get_fiat_transactions
      description: Track your Fiat deposits and withdrawals by querying the identifier or mode of the transaction
      security:
        - bearerAuth: []
          idToken: []
      parameters:
        - name: mode
          in: query
          schema:
            type: string
          description: The mode of the transaction CashInCashOut
        - name: identifier
          in: query
          schema:
            type: string
          description: Unique identifier supplied by client
      responses:
        '200':
          description: Schema of Response Payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id:
                    type: string
                    description: The request id for your transaction
                  transaction_id:
                    type: string
                    description: Transaction id from the deposit / withdrawal
                  amount:
                    type: number
                    description: Amount of the deposit / withdrawal
                  fee:
                    type: number
                    description: PDAX fee implemented on the deposit / withdrawal
                  method:
                    type: string
                    description: See Method under Accepted Values
                  mode:
                    type: string
                    description: The mode of the transaction, either Cash In or Cash Out
                  reference_number:
                    type: string
                    description: The reference number generated from the Cash In or Cash Out transaction
                  fulfilled_at:
                    type: string
                    description: If fulfilledAt contains a date and time, it is successful  If blank, it is pending
                  declined_at:
                    type: string
                    description: If declinedAt contains a date and time, its failed  If blank, it is pending
                  rejection_reason:
                    type: string
                    description:
                      If the transaction failed, value is the reason why transaction was rejected  If the transaction
                      is success, value is null
                  currency:
                    type: string
                    description: Currency of the transaction
                  created_at:
                    type: string
                    description: Timestamp of the transaction when it was created
                  updated_at:
                    type: string
                    description: Timestamp of the transaction when it was updated
                  status:
                    type: string
                    description: 'Possible values: IN-PROGRESS, COMPLETED, FAILED'
                  identifier:
                    type: string
                    description: Unique identifier supplied by client
                  fee_type:
                    type: string
                    description: Fiat out fee to be shouldered either by Sender or Beneficiary
                  retried_methods:
                    type: array
                    description: Attempts per transaction
        '401':
          description: Unauthorized - invalid or expired token
  /pdax-institution/v1/crypto/transactions:
    get:
      summary: GET Crypto Transactions
      tags:
        - Deposit and Withdrawal check
      operationId: get_crypto_transactions
      description: Track your crypto deposits and withdrawals by querying the identifier or transaction hash
      security:
        - bearerAuth: []
          idToken: []
      parameters:
        - name: identifier
          in: query
          schema:
            type: string
          description: Unique identifier supplied by client
        - name: txn_hash
          in: query
          schema:
            type: string
          description: Transaction hash
      responses:
        '200':
          description: Schema of Response Payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  transaction_id:
                    type: string
                    description: Transaction id from the deposit / withdrawal
                  type:
                    type: string
                    description: Type of transaction
                  debit_ccy:
                    type: string
                    description: Currency of the debited amount
                  credit_ccy:
                    type: string
                    description: Currency of the credited amount
                  debit_amount:
                    type: string
                    description: Amount debited from the PDAX wallet
                  debit_net_amount:
                    type: string
                    description: Net amount debited from the PDAX wallet (less fees)
                  credit_amount:
                    type: string
                    description: Amount credited to the PDAX wallet
                  credit_net_amount:
                    type: string
                    description: Net amount debited from the PDAX wallet (less fees)
                  fee_amount:
                    type: string
                    description: The fees from the transaction
                  status:
                    type: string
                    description: 'Possible values: pending, completed, failed'
                  created_at:
                    type: string
                    description: Timestamp of the transaction when it was created
                  txn_hash:
                    type: string
                    description: Unique identifier that is used to track the transaction on the blockchain
                  sender_email:
                    type: string
                    description: Email of the sender
                  sender_wallet_address:
                    type: string
                    description: Wallet address of the sender
                  sender_wallet_address_tag:
                    type: string
                    description: Wallet address tag of the sender
                  receiver_email:
                    type: string
                    description: Receiver email
                  receiver_wallet_address:
                    type: string
                    description: Receiver wallet address
                  receiver_wallet_address_tag:
                    type: string
                    description: Receiver wallet address tag
              example:
                data:
                  - transaction_id: 22829
                    type: crypto_in
                    debit_ccy: null
                    credit_ccy: UNI
                    debit_amount: '0'
                    debit_net_amount: '0'
                    credit_amount: '0.68'
                    credit_net_amount: '0.68'
                    fee_amount: '0'
                    status: completed
                    created_at: '2023-07-17T11:06:25.285Z'
                    txn_hash: '0xb14b15995b6456ac9b5c67ac53258084778a9eaa913bdecd8e7f32f03cc0b3b0'
                    sender_email: null
                    sender_wallet_address: null
                    sender_wallet_address_tag: null
                    receiver_email: null
                    receiver_wallet_address: null
                    receiver_wallet_address_tag: null
                status: success
        '401':
          description: Unauthorized - invalid or expired token
  /pdax-institution/v1/balances:
    get:
      summary: Get Balances
      tags:
        - Balances
      operationId: get_balances
      description: View the balance of all assets.
      security:
        - bearerAuth: []
          idToken: []
      parameters:
        - name: currency
          in: query
          schema:
            type: string
          description: Currency
      responses:
        '200':
          description: Schema of Response Payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  currency:
                    type: string
                    description: Currency
                  available:
                    type: string
                    description: Currency available for withdrawal and for trading
                  hold:
                    type: string
                    description: Currency balance held due to open orders or pending withdrawal
                  total:
                    type: string
                    description: The total balance sum of available and hold
                  asset_type:
                    type: string
                    description: Fiat or Crypto
              example:
                data:
                  - currency: USDCXLM
                    available: '1000001'
                    hold: '0'
                    total: '1000001'
                    asset_type: CRYPTO
                  - currency: PHP
                    available: '1000001'
                    hold: '0'
                    total: '1000001'
                    asset_type: FIAT
        '401':
          description: Unauthorized - invalid or expired token
  /pdax-institution/v1/config/webhook:
    post:
      summary: Webhook Events for Fiat Transactions
      tags:
        - Webhook
      operationId: webhook_events_for_fiat_transactions
      description: Register your URL to receive webhook events for Fiat Transactions
      security:
        - bearerAuth: []
          idToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                event_type:
                  type: string
                  description: The type of events you would like to receive   fiat
                webhook_endpoint:
                  type: string
                  description: Your deployed webhook endpoint
      responses:
        '200':
          description: Schema of Fiat Event Data
          content:
            application/json:
              schema:
                type: object
                properties:
                  identifier:
                    type: string
                    description: Unique identifier supplied by client
                  user_id:
                    type: string
                    description: UUID of the user
                  request_id:
                    type: string
                    description: Request ID of the transaction
                  reference_number:
                    type: string
                    description: reference_number from the Fiat Out response payload
                  amount:
                    type: number
                    description: The amount being withdrawn or deposited excluding fees
                  asset:
                    type: string
                    description: The fiat currency being withdrawn or deposited
                  asset_type:
                    type: string
                    description: The asset of the transaction, PHP only
                  transaction_type:
                    type: string
                    description: The type of transaction WITHDRAWAL or DEPOSIT
                  status:
                    type: string
                    description: 'Possible values: IN-PROGRESS, COMPLETED, FAILED'
                  method:
                    type: string
                    description: The method of which was used for the transaction
                  fee:
                    type: number
                    description: The deposit or withdrawal fee involved in the transaction
              example:
                data:
                  webhook_endpoint: https://partner-url.com/api/pdax-api/pdax-institution/v1/webhook
                  event_type: fiat
                status: success
        '401':
          description: Unauthorized - invalid or expired token
