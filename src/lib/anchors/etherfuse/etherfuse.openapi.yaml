  # ============================================================================
  # Organization Endpoints (API Key Authenticated)
  # ============================================================================

  /ramp/organization:
    post:
      tags:
        - Organizations
      summary: Create a child organization
      description: |
        Creates a new child organization under the caller's organization. The child org is created
        in an unapproved state — approval happens separately through the Etherfuse approval workflow.

        Optionally include wallets and a bank account to set up the child org in a single call.
        Wallets are registered but not claimed — claiming and KYC sync happen after org approval.

        If any provided UUID collides with an existing record, the request returns 409.

        All fields are optional — sending an empty body `{}` creates a bare organization with no wallets or bank account.

        ## Account types

        Every organization has an `accountType` of either `personal` (an individual customer
        completing KYC) or `business` (a company completing KYB). The two are handled differently
        downstream: personal orgs go through individual KYC and Plaid; business orgs go through
        KYB and skip per-wallet compliance.

        - `personal` — pass `userInfo` so the end user records are created and we can email them on status changes.
        - `business` — `userInfo` is rejected (business orgs do not have a single end user).

        `accountType` is currently optional and defaults to `personal`. **It will become required
        in a future release** — start sending it explicitly now.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                  description: Optional UUID to use as the organization's primary key. If omitted, a UUID is generated automatically.
                displayName:
                  type: string
                  description: Optional display name for the new organization. At most 200 characters. If omitted, defaults to "Customer for {parent org name}".
                  maxLength: 200
                accountType:
                  type: string
                  enum: [personal, business]
                  description: |
                    Type of organization. Defaults to `personal`. Will become required in a
                    future release. See "Account types" above for guidance.
                userInfo:
                  $ref: '#/components/schemas/UserInfo'
                wallets:
                  type: array
                  description: Optional wallets to register for the new organization. Maximum 50 wallets per request.
                  maxItems: 50
                  items:
                    type: object
                    required:
                      - publicKey
                      - blockchain
                    properties:
                      id:
                        type: string
                        format: uuid
                        description: Optional UUID for the wallet record. Generated if omitted.
                      publicKey:
                        type: string
                        description: Public key of the wallet
                      blockchain:
                        type: string
                        enum: [solana, stellar, base, polygon, monad]
                        description: Blockchain type for the wallet
                partnerFeeDefaultBps:
                  type: integer
                  minimum: 0
                  maximum: 500
                  description: Optional default partner fee in basis points for this child organization (0–500). If omitted, defaults to 0 (no partner fee).
                bankAccount:
                  type: object
                  description: |
                    Optional bank account to register for the new organization. Uses the same schema as the bank account creation endpoint.

                    **Sandbox:** Submit `XEXX010101000` (personal) or `XEX010101000` (business) as the `rfc` so Etherfuse skips SPEI provider registration and marks the account `compliant: true` immediately. Any other RFC in sandbox is sent through to the SPEI provider's sandbox environment as a real registration and will not auto-approve.
                  properties:
                    bankAccountId:
                      type: string
                      format: uuid
                      description: Optional UUID for the bank account. Generated if omitted.
                    label:
                      type: string
                      nullable: true
                      description: Optional label for the bank account
                    skipAutoApproval:
                      type: boolean
                      default: false
                      description: 'If true, skips automatic approval in sandbox/devnet environments'
                    account:
                      $ref: '#/components/schemas/AccountRegistration'
            example:
              id: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890'
              displayName: 'Ana García'
              accountType: 'personal'
              userInfo:
                email: 'ana@example.com'
                displayName: 'Ana García'
              wallets:
                - publicKey: '9Qx7r...'
                  blockchain: 'solana'
                - id: 'b2c3d4e5-f6a7-8901-bcde-f12345678901'
                  publicKey: 'GCRYUGD5...'
                  blockchain: 'stellar'
      responses:
        '201':
          description: Organization created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  organizationId:
                    type: string
                    format: uuid
                    description: ID of the newly created organization
                  displayName:
                    type: string
                    description: Display name of the organization
                  accountType:
                    type: string
                    enum: [personal, business]
                    description: Account type the organization was created with.
                  partnerFeeDefaultBps:
                    type: integer
                    description: Default partner fee in basis points for this organization
                  wallets:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                          description: Wallet record ID
                        publicKey:
                          type: string
                          description: Public key of the wallet
                        blockchain:
                          type: string
                          description: Blockchain type
                  bankAccount:
                    type: object
                    nullable: true
                    properties:
                      id:
                        type: string
                        format: uuid
                        description: Bank account ID
                      label:
                        type: string
                        nullable: true
                        description: Bank account label
                      status:
                        type: string
                        description: Bank account status
              example:
                organizationId: 'a1b2c3d4-e5f6-7890-abcd-ef1234567890'
                displayName: 'Ana García'
                accountType: 'personal'
                wallets:
                  - id: 'c3d4e5f6-a7b8-9012-cdef-123456789012'
                    publicKey: '9Qx7r...'
                    blockchain: 'solana'
                  - id: 'b2c3d4e5-f6a7-8901-bcde-f12345678901'
                    publicKey: 'GCRYUGD5...'
                    blockchain: 'stellar'
                bankAccount: null
        '400':
          description: Invalid request — empty name, name exceeds 200 characters, invalid wallet data, or wallet count exceeds 50
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: A provided UUID collides with an existing record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /ramp/organization/{org_id}/name:
    put:
      tags:
        - Organizations
      summary: Rename an organization
      description: |
        Renames the caller's own organization or a direct child organization. The caller's
        organization is resolved from the API key.

        The target `org_id` must be either:
        - The caller's own organization, OR
        - A direct child organization (where `parent_organization_id` equals the caller's org)

        Grandchild organizations cannot be renamed through this endpoint.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: org_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the organization to rename (own org or direct child)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - displayName
              properties:
                displayName:
                  type: string
                  description: New display name for the organization. Must be non-empty and at most 200 characters.
                  maxLength: 200
            example:
              displayName: 'Bando Guadalajara'
      responses:
        '200':
          description: Organization renamed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  organizationId:
                    type: string
                    format: uuid
                    description: ID of the renamed organization
                  displayName:
                    type: string
                    description: New display name
              example:
                organizationId: '123e4567-e89b-12d3-a456-426614174000'
                displayName: 'Bando Guadalajara'
        '400':
          description: Invalid name — empty, whitespace-only, or exceeds 200 characters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Caller does not have authority over this organization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Organization not found or soft-deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /ramp/partner-fee:
    put:
      tags:
        - Organizations
      summary: Set partner fee default
      description: |
        Sets the default partner fee (in basis points) for the caller's organization. The
        target organization is resolved from the API key — the fee always applies to the org
        that owns the key. The fee is capped at 500 bps (5.00%).

        To configure a different org (for example, a child organization), call this endpoint
        using an API key issued for that org.

        Once set, this default is applied to all new quotes for the organization unless overridden
        per-quote via the `partnerFeeBps` field on the quote request.

        Partner fees are layered on top of platform fees and settled offline via finance —
        there is no on-chain component.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - partnerFeeDefaultBps
              properties:
                partnerFeeDefaultBps:
                  type: integer
                  minimum: 0
                  maximum: 500
                  description: Default partner fee in basis points (0–500). Set to 0 to disable.
            example:
              partnerFeeDefaultBps: 100
      responses:
        '200':
          description: Partner fee default updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  partnerFeeDefaultBps:
                    type: integer
                    description: The new default partner fee in basis points
              example:
                partnerFeeDefaultBps: 100
        '400':
          description: Invalid value — must be between 0 and 500
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /ramp/customer/{customer_id}/wallet:
    post:
      tags:
        - Crypto Wallets
      summary: Register a wallet for a child org customer
      description: |
        Registers a crypto wallet for a customer that belongs to the caller's organization or a
        direct child organization. This mirrors `POST /ramp/wallet` but is scoped to a specific
        customer within the caller's org hierarchy.

        If the wallet was previously soft-deleted, it will be restored. Optionally claims ownership
        of the wallet on behalf of the customer's organization.

        This endpoint is idempotent — registering an already-active wallet returns the existing record.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: customer_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the customer to register the wallet for. Must belong to the caller's org or a direct child org.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - publicKey
                - blockchain
              properties:
                publicKey:
                  type: string
                  description: The public key of the crypto wallet to register
                blockchain:
                  type: string
                  enum: [solana, stellar, base, polygon, monad]
                  description: Blockchain type for the wallet
                claimOwnership:
                  type: boolean
                  default: false
                  description: If true, the customer's organization claims ownership of this wallet. Combined with an approved org, this makes the wallet compliant without individual KYC.
            example:
              publicKey: '9Qx7r...'
              blockchain: 'solana'
              claimOwnership: false
      responses:
        '200':
          description: Wallet registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Wallet'
        '400':
          description: Invalid public key format, invalid blockchain, or wallet already claimed by a different organization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Customer not found or not within the caller's organization hierarchy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /ramp/evm/approve:
    post:
      tags:
        - Orders
      summary: Generate EVM token approval transaction
      description: |
        Generates an unsigned ERC20 `approve()` transaction that enables gasless offramps
        on EVM chains. When this feature is enabled for your organization, EVM offramp
        transactions no longer require the user to hold native gas tokens (e.g., ETH on Base)
        for the cross-chain bridging fee — Etherfuse covers the bridging cost and bundles it
        into the offramp fee.

        **This approval must be completed before creating an offramp order** via
        `POST /ramp/order` for EVM wallets with this feature enabled. If the user has not
        approved, the offramp transaction will fail on-chain.

        **Prerequisites:**
        - This feature must be enabled for your organization. Contact Etherfuse to enable
          sponsored EVM offramps for your org and sub-orgs.
        - The user must have a registered EVM wallet on a supported chain.

        **Flow:**
        1. Call this endpoint to get the approval transaction
        2. Have the user sign and submit the transaction in their wallet
        3. Once confirmed, create the offramp order via `POST /ramp/order`

        **Approval amount options:**
        - **Omit `amount`** (recommended): Approves for an unlimited amount. The user only
          needs to do this once per token per chain, and all future offramps will work
          without needing another approval.
        - **Pass `amount`**: Approves for a specific amount in base units. The amount should
          match what you plan to offramp. After the offramp, the approval is consumed and
          you will need to call this endpoint again before the next offramp.

        If the user has already approved a sufficient amount, the endpoint returns
        `"transaction": null` with a message indicating no approval is needed.

        The `amount` field is in **base units** (e.g., for a token with 6 decimals,
        pass `10000000` for 10 tokens).
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - blockchain
                - wallet
                - assetId
              properties:
                blockchain:
                  type: string
                  description: The EVM chain to approve on
                  example: 'base'
                  enum:
                    - base
                wallet:
                  type: string
                  description: The user's EVM wallet address
                  example: '0xf82567432381D1326484E5A9140ABCa4294f82D0'
                  pattern: '^0x[a-fA-F0-9]{40}$'
                assetId:
                  type: string
                  description: The token contract address to approve
                  example: '0xcC77c598d42f2f78Beb42C91d12B9d4041a5cE29'
                  pattern: '^0x[a-fA-F0-9]{40}$'
                amount:
                  type: string
                  description: |
                    Amount to approve in base units (token smallest denomination).
                    For a token with 6 decimals, `10000000` = 10 tokens.
                    If omitted, approves for the maximum amount (recommended for one-time approval).
                  example: '10000000'
            examples:
              unlimited_approval:
                summary: Unlimited approval (recommended)
                value:
                  blockchain: 'base'
                  wallet: '0xf82567432381D1326484E5A9140ABCa4294f82D0'
                  assetId: '0xcC77c598d42f2f78Beb42C91d12B9d4041a5cE29'
              specific_amount:
                summary: Approve specific amount
                value:
                  blockchain: 'base'
                  wallet: '0xf82567432381D1326484E5A9140ABCa4294f82D0'
                  assetId: '0xcC77c598d42f2f78Beb42C91d12B9d4041a5cE29'
                  amount: '10000000'
      responses:
        '200':
          description: Approve transaction generated (or already approved)
          content:
            application/json:
              schema:
                type: object
                properties:
                  transaction:
                    type: string
                    nullable: true
                    description: |
                      JSON-serialized unsigned transaction for the user to sign.
                      Null if the user has already approved a sufficient amount.
                  message:
                    type: string
                    description: Human-readable status message
                  currentAllowance:
                    type: string
                    description: Current token allowance (only present when already approved)
              examples:
                needs_approval:
                  summary: Approval needed
                  value:
                    transaction: '{"to":"0xcC77c598...","data":"0x095ea7b3...","value":"0","gasLimit":"51861","nonce":39,"gasPrice":"6000000","chainId":84532}'
                    message: 'Approve transaction for gasless offramps on base'
                already_approved:
                  summary: Already approved
                  value:
                    transaction: null
                    message: 'Already approved — no transaction needed'
                    currentAllowance: '115792089237316195423570985008687907853269984665640564039457584007913129639935'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                not_enabled:
                  summary: Feature not enabled on this chain
                  value:
                    error: 'Sponsored transactions not available on polygon'
                invalid_wallet:
                  summary: Invalid wallet address
                  value:
                    error: 'Invalid wallet address format'

  # ============================================================================
  # Lookup Endpoints (Public - No Authentication Required)
  # ============================================================================

  /lookup/country-codes:
    get:
      operationId: getCountryCodes
      tags:
        - Lookup
      summary: Get country codes
      description: |
        Returns the list of supported countries with ISO 3166-1 alpha-2 codes, alpha-3 codes, and English names.
        Use these codes for `birthCountryIsoCode` and `countryIsoCode` fields when registering bank accounts.
        This endpoint is public and does not require authentication.
      responses:
        '200':
          description: Country codes retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    code:
                      type: string
                      description: ISO 3166-1 alpha-2 code
                      example: 'MX'
                    code3:
                      type: string
                      description: ISO 3166-1 alpha-3 code
                      example: 'MEX'
                    name:
                      type: string
                      description: English country name
                      example: 'Mexico'

  /lookup/stablebonds:
    get:
      operationId: getStablebonds
      tags:
        - Lookup
      summary: Get all stablebonds
      description: |
        Returns a list of all stablebonds with their current prices, supplies, and multi-chain breakdown.
        This endpoint is public and does not require authentication.
        Data is cached for 5 minutes.
      responses:
        '200':
          description: Stablebonds retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StablebondsLookupResponse'
              example:
                calculatedAt: '2024-01-15T12:00:00Z'
                stablebonds:
                  - symbol: 'CETES'
                    netAmountDecimal: '1309439.053036'
                    netValueDecimal: '1467139.953242'
                    bondCurrency: 'MXN'
                    tokenPriceDecimal: '1.120434'
                    purchaseOrderAmount: '283617.373522'
                    redeemOrderAmount: '0'
                    blockchains:
                      - blockchain: 'stellar'
                        tokenIdentifier: 'CETES-GC3CW7EDYRTWQ635VDIGY6S4ZUF5L6TQ7AA4MWS7LEQDBLUSZXV7UPS4'
                        totalSupply: '106595.334047'
                      - blockchain: 'solana'
                        tokenIdentifier: 'AvvetPGuuB5FD5m86fpw3LtDKyQoUFT1mG9WarNQLW4q'
                        totalSupply: '916496.867925'
                    solanaMintAddress: 'AvvetPGuuB5FD5m86fpw3LtDKyQoUFT1mG9WarNQLW4q'

  /lookup/exchange_rate:
    get:
      operationId: getExchangeRates
      tags:
        - Lookup
      summary: Get all exchange rates
      description: |
        Returns current USD exchange rates for all supported currencies.
        This endpoint is public and does not require authentication.
      responses:
        '200':
          description: Exchange rates retrieved successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  properties:
                    rate:
                      type: string
                      description: The USD to currency exchange rate
                    updated_at:
                      type: integer
                      description: Unix timestamp of when this rate was last updated
                    sources:
                      type: object
                      additionalProperties:
                        type: object
                        properties:
                          rate:
                            type: string
                          updated_at:
                            type: integer
                      description: Per-provider exchange rate data
              example:
                usd_to_mxn:
                  rate: '17.15'
                  updated_at: 1709510400
                  sources:
                    provider_1:
                      rate: '17.15'
                      updated_at: 1709510400
                usd_to_brl:
                  rate: '4.97'
                  updated_at: 1709510400
                  sources:
                    provider_1:
                      rate: '4.97'
                      updated_at: 1709510400

  /lookup/exchange_rate/usd_to_{currency}:
    get:
      operationId: getExchangeRateForCurrency
      tags:
        - Lookup
      summary: Get specific exchange rate
      description: |
        Returns the current USD to specified currency exchange rate.
        This endpoint is public and does not require authentication.
      parameters:
        - name: currency
          in: path
          required: true
          schema:
            type: string
          description: The target currency code (e.g., "mxn", "brl", "eur")
          example: 'mxn'
      responses:
        '200':
          description: Exchange rate retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  rate:
                    type: string
                    description: The USD to currency exchange rate
                  updated_at:
                    type: integer
                    description: Unix timestamp of when this rate was last updated
                  sources:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        rate:
                          type: string
                        updated_at:
                          type: integer
                    description: Per-provider exchange rate data
              example:
                rate: '17.15'
                updated_at: 1709510400
                sources:
                  provider_1:
                    rate: '17.15'
                    updated_at: 1709510400
        '404':
          description: Currency not supported
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /lookup/bonds/cost:
    get:
      operationId: getBondCosts
      tags:
        - Lookup
      summary: Get all bond costs
      description: |
        Returns current pricing data for all stablebonds, including the bond cost in USD, fiat, and per-provider exchange rate sources.
        Each bond entry includes a `sources` map showing the exchange rate and derived `bond_cost_in_usd` from each FX provider, enabling oracle safety checks.
        This endpoint is public and does not require authentication.
      parameters:
        - name: max_age
          in: query
          required: false
          schema:
            type: integer
          description: Maximum age of a source in seconds. Sources older than this are excluded from the `sources` map. When omitted, all sources are returned.
          example: 3600
      responses:
        '200':
          description: Bond costs retrieved successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/BondCost'
              example:
                CETES7CKqqKQizuSN6iWQwmTeFRjbJR6Vw2XRKfEDR8f:
                  bond_cost_in_payment_token: '1.153754'
                  bond_cost_in_usd: '0.064785'
                  fiat_exchange_rate_with_usd: '17.80900'
                  bond_cost_in_fiat: '1.153754'
                  current_basis_points: 578
                  bond_symbol: 'CETES'
                  currency: 'MXN'
                  current_time: '2026-03-23T16:50:32.821673099+00:00'
                  mint: 'EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v'
                  symbol: 'USDC'
                  sources:
                    provider_1:
                      exchange_rate: '17.81'
                      bond_cost_in_usd: '0.064781'
                      updated_at: 1711212632
                    provider_2:
                      exchange_rate: '17.79'
                      bond_cost_in_usd: '0.064854'
                      updated_at: 1711212630
        '500':
          description: Bond prices not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /lookup/bonds/cost/{identifier}:
    get:
      operationId: getBondCost
      tags:
        - Lookup
      summary: Get bond cost by mint or symbol
      description: |
        Returns current pricing data for a single stablebond, including the bond cost in USD, fiat, and per-provider exchange rate sources.
        The `identifier` can be either a Solana mint address (e.g., `CETES7CKqqKQizuSN6iWQwmTeFRjbJR6Vw2XRKfEDR8f`) or a bond symbol (e.g., `CETES`).
        This endpoint is public and does not require authentication.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
          description: Bond mint address or symbol (e.g., "CETES", "USTRY", "CETES7CKqqKQizuSN6iWQwmTeFRjbJR6Vw2XRKfEDR8f")
          example: 'CETES'
        - name: max_age
          in: query
          required: false
          schema:
            type: integer
          description: Maximum age of a source in seconds. Sources older than this are excluded from the `sources` map. When omitted, all sources are returned.
          example: 3600
      responses:
        '200':
          description: Bond cost retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BondCost'
              example:
                bond_cost_in_payment_token: '1.153754'
                bond_cost_in_usd: '0.064785'
                fiat_exchange_rate_with_usd: '17.80900'
                bond_cost_in_fiat: '1.153754'
                current_basis_points: 578
                bond_symbol: 'CETES'
                currency: 'MXN'
                current_time: '2026-03-23T16:50:32.821673099+00:00'
                mint: 'EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v'
                symbol: 'USDC'
                sources:
                  provider_1:
                    exchange_rate: '17.81'
                    bond_cost_in_usd: '0.064781'
                    updated_at: 1711212632
                  provider_2:
                    exchange_rate: '17.79'
                    bond_cost_in_usd: '0.064854'
                    updated_at: 1711212630
        '404':
          description: Bond not found for the given identifier
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Bond price not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
