        updatedAt: '2025-01-15T10:05:00Z'

    KycSubmissionRequest:
      type: object
      description: Request body for submitting KYC identity data programmatically
      required:
        - identity
      properties:
        pubkey:
          type: string
          description: Public key of the wallet to submit KYC for. Optional — if omitted, KYC is attached at the organization level.
        identity:
          type: object
          description: User identity information
          properties:
            name:
              type: object
              properties:
                givenName:
                  type: string
                  description: First/given name
                familyName:
                  type: string
                  description: Last/family name
            dateOfBirth:
              type: string
              format: date
              description: Date of birth (YYYY-MM-DD)
            address:
              type: object
              properties:
                street:
                  type: string
                city:
                  type: string
                region:
                  type: string
                  description: State or region
                postalCode:
                  type: string
                country:
                  type: string
                  description: ISO 3166-1 alpha-2 country code (e.g., "MX")
            idNumbers:
              type: array
              description: Government ID numbers
              items:
                type: object
                properties:
                  value:
                    type: string
                    description: ID number (tax ID, national ID, etc.)
                  type:
                    type: string
                    description: Type of ID (e.g., "RFC", "CURP", "SSN")
      example:
        pubkey: '9Qx7r...'
        identity:
          name:
            givenName: 'John'
            familyName: 'Doe'
          dateOfBirth: '1990-01-15'
          address:
            street: '123 Main St'
            city: 'Mexico City'
            region: 'CDMX'
            postalCode: '06600'
            country: 'MX'
          idNumbers:
            - value: 'XAXX010101000'
              type: 'RFC'

    KycDocumentUploadRequest:
      type: object
      description: Request body for uploading KYC identity documents
      required:
        - documentType
        - images
      properties:
        pubkey:
          type: string
          description: Public key of the wallet to upload documents for. Optional — if omitted, documents are attached at the organization level.
        documentType:
          type: string
          enum: [document, selfie]
          description: Type of document being uploaded (government ID or selfie photo)
        images:
          type: array
          description: Array of images as data URLs (JPEG or PNG, max 10MB each)
          items:
            type: object
            required:
              - label
              - image
            properties:
              label:
                type: string
                description: Label for the image (e.g., "id_front", "id_back", "selfie")
              image:
                type: string
                description: Data URL containing base64-encoded image (e.g., "data:image/jpeg;base64,/9j/4AAQ...")
      example:
        pubkey: '9Qx7r...'
        documentType: 'document'
        images:
          - label: 'id_front'
            image: 'data:image/jpeg;base64,/9j/4AAQSkZJRg...'
          - label: 'id_back'
            image: 'data:image/jpeg;base64,/9j/4AAQSkZJRg...'

    KycStatusResponse:
      type: object
      description: KYC status and submission details for a customer's wallet
      properties:
        customerId:
          type: string
          format: uuid
          description: Customer ID
        walletPublicKey:
          type: string
          description: Wallet public key
        status:
          type: string
          enum: [not_started, proposed, approved, approved_chain_deploying, rejected]
          description: Current KYC status. The `approved_chain_deploying` status indicates approval is complete but on-chain marking is in progress (Solana only).
        onChainMarked:
          type: boolean
          nullable: true
          description: Whether KYC is marked on the blockchain. Only present for Solana wallets.
        currentRejectionReason:
          type: string
          nullable: true
          description: Reason for rejection (if status is rejected)
        selfies:
          type: array
          description: Selfie verification images submitted by this partner
          items:
            $ref: '#/components/schemas/ProofOfIdentityContent'
        documents:
          type: array
          description: Identity documents submitted by this partner
          items:
            $ref: '#/components/schemas/ProofOfIdentityDocument'
        currentKycInfo:
          $ref: '#/components/schemas/ProofOfIdentityUserInfo'
        approvedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when KYC was approved
      example:
        customerId: '123e4567-e89b-12d3-a456-426614174000'
        walletPublicKey: '9Qx7r...'
        status: 'approved'
        onChainMarked: true
        currentRejectionReason: null
        selfies: []
        documents: []
        currentKycInfo:
          id: 'info-123'
          email: 'juan@example.com'
          phoneNumber: '+521234567890'
          dateOfBirth: '1990-05-15'
          name:
            givenName: 'Juan'
            familyName: 'Garcia'
          address:
            street: 'Av. Reforma 123'
            city: 'Mexico City'
            region: 'CDMX'
            postalCode: '06600'
            country: 'MX'
          idNumbers:
            - value: 'GAJU900515HDFRNN09'
              type: 'CURP'
        approvedAt: '2024-01-01T00:00:00Z'

    ProofOfIdentityContent:
      type: object
      description: A KYC verification content item (selfie or document image set)
      properties:
        id:
          type: string
          description: Unique identifier for this content
        type:
          type: string
          description: Content type (e.g., "selfie", "document")
        contentLabel:
          type: string
          nullable: true
          description: Label for the content
        status:
          type: string
          enum: [approved, rejected, proposed]
          description: Review status of this content
        createdAt:
          type: string
          format: date-time
          nullable: true
          description: When the content was submitted
        approvedAt:
          type: string
          format: date-time
          nullable: true
          description: When the content was approved
        rejectedAt:
          type: string
          format: date-time
          nullable: true
          description: When the content was rejected
        rejectedReason:
          type: string
          nullable: true
          description: Reason for rejection
        ipAddress:
          type: string
          nullable: true
          description: IP address of submitter
        images:
          type: array
          nullable: true
          description: Image URLs for this content
          items:
            $ref: '#/components/schemas/ImageInfo'
        videoURL:
          type: string
          nullable: true
          description: Video URL if applicable

    ProofOfIdentityDocument:
      type: object
      description: A KYC identity document with extracted data
      allOf:
        - $ref: '#/components/schemas/ProofOfIdentityContent'
        - type: object
          properties:
            extractedData:
              $ref: '#/components/schemas/ProofOfIdentityUserInfo'
              nullable: true
              description: Data extracted from the document via OCR

    ProofOfIdentityUserInfo:
      type: object
      description: Identity information for a user
      properties:
        id:
          type: string
          description: Unique identifier
        walletId:
          type: string
          nullable: true
          description: Associated wallet ID
        organizationId:
          type: string
          format: uuid
          nullable: true
          description: Organization that owns this data
        email:
          type: string
          nullable: true
          description: Email address
        useEmailForMarketing:
          type: boolean
          nullable: true
          description: Marketing email consent
        phoneNumber:
          type: string
          nullable: true
          description: Phone number
        dateOfBirth:
          type: string
          nullable: true
          description: Date of birth (YYYY-MM-DD)
        name:
          $ref: '#/components/schemas/ProofOfIdentityName'
          nullable: true
        address:
          $ref: '#/components/schemas/ProofOfIdentityAddress'
          nullable: true
        idNumbers:
          type: array
          description: Government ID numbers
          items:
            $ref: '#/components/schemas/ProofOfIdentityIdNumber'
        occupation:
          type: string
          nullable: true
          description: Occupation
        identificationType:
          type: string
          nullable: true
          description: Type of identification used
        sourceOrganizationId:
          type: string
          format: uuid
          nullable: true
          description: Organization that submitted this data

    ProofOfIdentityName:
      type: object
      description: User's name information
      properties:
        givenName:
          type: string
          description: First name
        familyName:
          type: string
          description: Last name
        middleName:
          type: string
          nullable: true
          description: Middle name
        motherMaidenName:
          type: string
          nullable: true
          description: Mother's maiden name
        preferredName:
          type: string
          nullable: true
          description: Preferred name
      required:
        - givenName
        - familyName

    ProofOfIdentityAddress:
      type: object
      description: User's address information
      properties:
        street:
          type: string
          nullable: true
          description: Street address line 1
        street2:
          type: string
          nullable: true
          description: Street address line 2
        city:
          type: string
          nullable: true
          description: City
        region:
          type: string
          nullable: true
          description: State/region/province
        postalCode:
          type: string
          nullable: true
          description: Postal/ZIP code
        country:
          type: string
          description: Country code (ISO 3166-1 alpha-2)
      required:
        - country

    ProofOfIdentityIdNumber:
      type: object
      description: Government ID number
      properties:
        value:
          type: string
          description: The ID number value
        type:
          type: string
          description: Type of ID (e.g., "CURP", "INE", "passport")
      required:
        - value
        - type

    ImageInfo:
      type: object
      description: Image information with URL and label
      properties:
        imageURL:
          type: string
          description: URL to access the image
        label:
          type: string
          description: Label for the image (e.g., "id_front", "id_back", "selfie")
      required:
        - imageURL
        - label

    KycUpdateWebhookPayload:
      type: object
      description: Webhook payload sent when KYC status changes for a customer's wallet
      properties:
        customerId:
          type: string
          format: uuid
          description: ID of the customer whose KYC status changed
        walletPublicKey:
          type: string
          description: Public key of the wallet
        approved:
          type: boolean
          description: Whether the KYC is now approved
        updateReason:
          type: string
          nullable: true
          description: Reason for the KYC status update (e.g., rejection reason)
      example:
        customerId: '123e4567-e89b-12d3-a456-426614174000'
        walletPublicKey: '9Qx7r...'
        approved: true
        updateReason: 'KYC approved by admin'

    CreateWebhookRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Webhook ID
        eventType:
          type: string
          enum: [bank_account_updated, customer_updated, order_updated, swap_updated, kyc_updated]
          description: Type of event to subscribe to
        url:
          type: string
          format: uri
          description: URL where webhook events will be sent
      example:
        id: '123e4567-e89b-12d3-a456-426614174000'
        eventType: 'order_updated'
        url: 'https://example.com/webhook'

    CreateWebhookResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Webhook ID
        eventType:
          type: string
          enum: [bank_account_updated, customer_updated, order_updated, swap_updated, kyc_updated]
          description: Type of event the webhook is subscribed to
        url:
          type: string
          format: uri
          description: URL where webhook events will be sent
        secret:
          type: string
          description: Webhook secret for signing events
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the webhook was created
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the webhook was last updated
      example:
        id: '123e4567-e89b-12d3-a456-426614174000'
        eventType: 'order_updated'
        url: 'https://example.com/webhook'
        secret: 'base64_encoded_secret'
        createdAt: '2024-01-01T00:00:00Z'
        updatedAt: '2024-01-01T00:00:00Z'

    # =========================================================================
    # Account Registration Schemas
    # =========================================================================

    PersonalAccountRegistration:
      type: object
      description: Personal bank account registration data
      required:
        - transactionId
        - firstName
        - paternalLastName
        - maternalLastName
        - birthDate
        - curp
        - rfc
        - clabe
      properties:
        transactionId:
          type: string
          format: uuid
          description: Unique transaction ID for this registration
        firstName:
          type: string
          description: Account holder's first name
        paternalLastName:
          type: string
          description: Account holder's paternal last name
        maternalLastName:
          type: string
          description: Account holder's maternal last name
        birthDate:
          type: string
          description: Date of birth in YYYYMMDD format
          example: '19900101'
        birthCountryIsoCode:
          type: string
          description: ISO 3166-1 alpha-2 country code for birth country. Defaults to MX if omitted.
          example: 'MX'
        birthCountryId:
          type: string
          description: Legacy numeric country ID. Prefer birthCountryIsoCode instead.
          deprecated: true
        curp:
          type: string
          description: Mexican CURP (Clave Única de Registro de Población)
        rfc:
          type: string
          description: Mexican RFC (Registro Federal de Contribuyentes)
        clabe:
          type: string
          description: 18-digit CLABE number (digits only, no letters or special characters)
      example:
        transactionId: '123e4567-e89b-12d3-a456-426614174000'
        firstName: 'Juan'
        paternalLastName: 'García'
        maternalLastName: 'López'
        birthDate: '19900101'
        birthCountryIsoCode: 'MX'
        curp: 'GALJ900101HDFRRN09'
        rfc: 'GALJ9001016V3'
        clabe: '012345678901234567'

    BusinessAccountRegistration:
      type: object
      description: Business bank account registration data
      required:
        - transactionId
        - name
        - incorporatedDate
        - rfc
        - clabe
      properties:
        transactionId:
          type: string
          format: uuid
          description: Unique transaction ID for this registration
        name:
          type: string
          description: Business legal name
        countryIsoCode:
          type: string
          description: ISO 3166-1 alpha-2 country code. Defaults to MX if omitted.
          example: 'MX'
        countryId:
          type: string
          description: Legacy numeric country ID. Prefer countryIsoCode instead.
          deprecated: true
        incorporatedDate:
          type: string
          description: Date of incorporation in YYYYMMDD format
          example: '20100315'
        rfc:
          type: string
          description: Mexican RFC (Registro Federal de Contribuyentes)
        clabe:
          type: string
          description: 18-digit CLABE number (digits only, no letters or special characters)

    AccountRegistration:
      oneOf:
        - $ref: '#/components/schemas/PersonalAccountRegistration'
        - $ref: '#/components/schemas/BusinessAccountRegistration'
      description: |
        Bank account registration data. Accepts either Personal or Business format.
        The variant is auto-detected based on the fields present (untagged union).

    # =========================================================================
    # Lookup Schemas
    # =========================================================================

    StablebondsLookupResponse:
      type: object
      properties:
        calculatedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp of when supply data was calculated
        stablebonds:
          type: array
          items:
            $ref: '#/components/schemas/StablebondInfo'

    StablebondInfo:
      type: object
      properties:
        symbol:
          type: string
          description: Token symbol (e.g., "CETES", "USTRY")
        netAmountDecimal:
          type: string
          description: Net token amount across all chains after adjustments
        netValueDecimal:
          type: string
          description: Net value in bond currency (net_amount * token_price)
        bondCurrency:
          type: string
          description: Bond's native currency (e.g., "MXN", "USD")
        tokenPriceDecimal:
          type: string
          description: Current token price in bond currency
        purchaseOrderAmount:
          type: string
          description: Tokens from matured purchase orders (not yet minted)
        redeemOrderAmount:
          type: string
          description: Tokens from unredeemed divestments (already paid but not burned)
        blockchains:
          type: array
          items:
            $ref: '#/components/schemas/BlockchainSupply'
          description: Per-chain supply breakdown
        solanaMintAddress:
          type: string
          description: Solana address of the stablebond mint (core identifier)

    BlockchainSupply:
      type: object
      properties:
        blockchain:
          type: string
          enum: [solana, stellar, base, polygon]
          description: Blockchain name
        tokenIdentifier:
          type: string
          description: Chain-specific token identifier
        totalSupply:
          type: string
          description: Total supply on this chain
        notCountedVaultedAmount:
          type: string
          nullable: true
          description: Amount vaulted and not counted in circulating supply

    BondCostSource:
      type: object
      properties:
        exchange_rate:
          type: string
          description: This provider's USD-to-fiat exchange rate
        bond_cost_in_usd:
          type: string
          description: Bond cost in USD derived from this provider's exchange rate
        updated_at:
          type: integer
          description: Unix timestamp of when this provider's rate was last updated

    BondCost:
      type: object
      properties:
        bond_cost_in_payment_token:
          type: string
          deprecated: true
          description: Bond cost in fiat (deprecated, same as bond_cost_in_fiat)
        bond_cost_in_usd:
          type: string
          description: Bond cost in USD using the aggregated exchange rate
        fiat_exchange_rate_with_usd:
          type: string
          description: Aggregated USD-to-fiat exchange rate used for the primary bond_cost_in_usd calculation
        bond_cost_in_fiat:
          type: string
          description: Bond cost in the bond's native fiat currency
        current_basis_points:
          type: integer
          description: Current interest rate in basis points
        bond_symbol:
          type: string
          description: Bond symbol (e.g., CETES, USTRY, GILTS)
        currency:
          type: string
          description: Fiat currency code (e.g., MXN, USD, EUR)
        current_time:
          type: string
          description: ISO 8601 timestamp of when this price was computed
        mint:
          type: string
          description: Payment token mint address (e.g., USDC mint)
        symbol:
          type: string
          description: Payment token symbol (e.g., USDC)
        sources:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/BondCostSource'
          description: Per-provider exchange rate data with derived bond_cost_in_usd for each provider

paths:
  /ramp/me:
    get:
      tags:
        - Lookup
      summary: Get current organization identity
      description: |
        Returns the identity of the organization associated with the current API key.
        Useful for verifying which organization your API key belongs to.
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Organization identity
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                    description: Organization ID
                  displayName:
                    type: string
                    description: Display name of the organization
                  approvedAt:
                    type: string
                    format: date-time
                    nullable: true
                    description: Timestamp when the organization was approved (KYB complete)
                  partnerFeeDefaultBps:
                    type: integer
                    minimum: 0
                    maximum: 500
                    description: Default partner fee in basis points applied to quotes for this organization. 0 means no partner fee.
              example:
                id: '123e4567-e89b-12d3-a456-426614174000'
                displayName: 'Acme Corp'
                approvedAt: '2024-06-15T10:00:00Z'
                partnerFeeDefaultBps: 0

  /ramp/assets:
    get:
      tags:
        - Assets
      summary: Get rampable assets
      description: |
        Returns all rampable stablecoins (e.g., USDC, EURC) and stablebonds (e.g., CETES) available on the specified blockchain.
        The `currency` parameter controls sort priority — assets matching the requested currency appear first in the list, but all rampable assets for the chain are always returned.
        Use the `identifier` from the response when creating quotes.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: blockchain
          in: query
          required: true
          schema:
            type: string
            enum: [stellar, solana, base, polygon, monad]
          description: The blockchain to get assets for
        - name: currency
          in: query
          required: true
          schema:
            type: string
          description: Fiat currency used for sort priority — assets associated with this currency appear first (e.g., "mxn")
        - name: wallet
          in: query
          required: true
          schema:
            type: string
          description: The wallet address to fetch balances for
      responses:
        '200':
          description: Assets retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  assets:
                    type: array
                    items:
                      $ref: '#/components/schemas/RampableAsset'
              example:
                assets:
                  - symbol: 'CETES'
                    identifier: 'CETES:GCRYUGD5NVARGXT56XEZI5CIFCQETYHAPQQTHO203IQZTHDHH4LATMYWC'
                    name: 'CETES'
                    currency: 'mxn'
                    balance: '50.00'
                    image: 'https://example.com/cetes.png'
                  - symbol: 'USDC'
                    identifier: 'USDC:GA5ZSEJYB37JRC5AVCIA5MOP4RHTM335X2KGX3IHOJAPP5RE34K4KZVN'
                    name: 'USD Coin'
                    currency: 'usd'
                    balance: '100.50'
                    image: 'https://example.com/usdc.png'
                  - symbol: 'EURC'
                    identifier: 'EURC:GDHU6WRG4IEQXM5NZ4BMPKOXHW76MZM4Y2IEMFDVXBSDP6SJY4ITNPP'
                    name: 'Euro Coin'
                    currency: 'eur'
                    balance: '25.00'
                    image: 'https://example.com/eurc.png'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /ramp/onboarding-url:
    post:
      tags:
        - Onboarding
      summary: Generate onboarding URL
      description: |
        Generates a presigned URL for customer onboarding. If the customer does not exist, it will be created.

        This is the primary endpoint for creating customers. You generate a UUID for `customerId` and `bankAccountId`,
        and Etherfuse will create the customer and bank account records associated with your organization.

        Upon visiting the URL, the customer will have 15 minutes to complete the onboarding process (KYC verification and bank account linking).

        ## Personal organizations only

        This endpoint always creates a **personal** organization — it forces individual KYC.
        There is no `accountType` field; pass `business` orgs through
        [POST /ramp/organization](#tag/organizations/post/ramp/organization) instead.

        ## userInfo

        Pass `userInfo` with the end user's email and display name. When provided, Etherfuse
        pre-creates the user record so the customer's eventual sign-in attaches to the right user
        and we can email them on status changes (KYC approved/rejected, bank account verified, etc.).

        `userInfo` is currently optional. **It will become required** in a future release — start
        sending it now.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateOnboardingUrlPayload'
      responses:
        '200':
          description: URL generated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  presigned_url:
                    type: string
                    description: The generated presigned URL. This URL needs to be visited by the customer, and will be used to verify the customer's identity and bank account.
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /ramp/onboarding/bank-accounts:
    post:
      tags:
        - Onboarding
      summary: Get onboarding bank accounts
      description: Retrieves bank accounts for onboarding process
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresignedUrlPayload'
      responses:
        '200':
          description: Bank accounts retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  bankAccounts:
                    type: array
                    items:
                      $ref: '#/components/schemas/BankAccount'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /ramp/bank-account:
    post:
      tags:
        - Bank Accounts
      summary: Create bank account (presigned URL)
      description: |
        Registers a customer's Mexican bank account (CLABE) for on/off-ramp transactions.
        The `account` field accepts two variants — Personal or Business — auto-detected based on the fields present.

        **Sandbox:** Submit `XEXX010101000` (personal) or `XEX010101000` (business) as the `rfc` to skip
        SPEI provider registration and have the account marked `compliant: true` immediately. Any other RFC
        in sandbox is sent through to the SPEI provider's sandbox environment as a real registration and
        will not auto-approve. Both values are rejected in production.

        **Note:** This endpoint is intended for customers onboarding through the Etherfuse UI using a presigned URL.
        For programmatic bank account creation via API key, use `POST /ramp/customer/{customer_id}/bank-account` instead.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - presignedUrl
                - account
              properties:
                presignedUrl:
                  type: string
                  description: Presigned URL for verification
                account:
                  $ref: '#/components/schemas/AccountRegistration'
                skipAutoApproval:
                  type: boolean
                  default: false
                  description: 'If true, skips automatic approval in sandbox environments'
                label:
                  type: string
                  description: Optional display label for the account
      responses:
        '200':
          description: Bank account created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankAccount'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /ramp/customer/{customer_id}/bank-account:
    post:
      tags:
        - Bank Accounts
      summary: Create bank account (API key)
      description: |
        Programmatically creates a new bank account for a customer using API key authentication.
        No presigned URL is required. The account registration data (name, CURP, RFC, CLABE, etc.)
        is validated and sent to the payment processor.
        Bank accounts require verification before they can be used for transactions.

        **Sandbox:** Submit `XEXX010101000` (personal) or `XEX010101000` (business) as the `rfc` to skip
        SPEI provider registration and have the account marked `compliant: true` immediately. The hosted
        onboarding UI uses these RFCs automatically — programmatic callers have to opt in by passing them.
        Any other RFC in sandbox is sent through to the SPEI provider's sandbox environment as a real
        registration and will not auto-approve. Both values are rejected in production.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: customer_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the customer to create the bank account for
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - account
              properties:
                account:
                  $ref: '#/components/schemas/AccountRegistration'
                skipAutoApproval:
                  type: boolean
                  default: false
                  description: 'If true, skips automatic approval in sandbox/devnet environments'
                label:
                  type: string
                  nullable: true
                  description: Optional label for the bank account
                bankAccountId:
                  type: string
                  format: uuid
                  description: 'Optional UUID for the bank account. Auto-generated if omitted.'
      responses:
        '201':
          description: Bank account created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BankAccount'
        '400':
          description: Invalid request parameters (invalid CLABE, RFC, CURP, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /ramp/agreements/electronic-signature:
    post:
      tags:
        - Agreements
      summary: Accept electronic signature consent
      description: |
        Records the user's consent to conduct business electronically (E-Sign Act compliance).

        **Authentication:** The presigned URL serves as the authentication mechanism for the end user.
        This endpoint must be called by or on behalf of the user who will be bound by this consent.

        **Legal effect:** By calling this endpoint with a valid presigned URL, the user consents to:
        - Receive documents and disclosures electronically
        - Use electronic signatures for legally binding agreements
        - Conduct transactions electronically

        This is typically the first agreement accepted during onboarding.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresignedUrlPayload'
      responses:
        '200':
          description: Electronic signature consent recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgreementResponse'
        '400':
          description: Invalid or expired presigned URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /ramp/agreements/terms-and-conditions:
    post:
      tags:
        - Agreements
      summary: Accept terms and conditions
      description: |
        Records the user's acceptance of Etherfuse's Terms and Conditions.

        **Authentication:** The presigned URL serves as the authentication mechanism for the end user.
        This endpoint must be called by or on behalf of the user who will be bound by these terms.

        **Legal effect:** By calling this endpoint with a valid presigned URL, the user acknowledges
        they have read, understood, and agree to be bound by the Terms and Conditions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresignedUrlPayload'
      responses:
