        - sendTransaction
        - sendTransactionHash
        - status
        - createdAt
        - updatedAt
      example:
        orderId: '123e4567-e89b-12d3-a456-426614174000'
        customerId: '34fcc67a-2454-4578-8435-e2bf03b4dc30'
        sendTransaction: 'AQAAAA...encoded_tx'
        sendTransactionHash: '3Kz8V2x...abc123'
        receiveTransactionHash: '4Lz9W3y...def456'
