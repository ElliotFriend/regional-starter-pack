  /ramp/wallet:
    post:
      tags:
        - Crypto Wallets
      summary: Register a crypto wallet
      description: |
        Registers a crypto wallet for the authenticated organization. If the wallet was previously
        soft-deleted, it will be restored.

        Optionally claims ownership of the wallet on behalf of the organization. When an approved
        (KYB'd) organization claims ownership of a wallet, that wallet is treated as compliant
        without requiring individual KYC verification.

        This endpoint is idempotent — registering an already-active wallet returns the existing record.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - publicKey
                - blockchain
              properties:
                publicKey:
                  type: string
                  description: The public key of the crypto wallet to register
                blockchain:
                  type: string
                  enum: [solana, stellar, base, polygon, monad]
                  description: Blockchain type for the wallet
                claimOwnership:
                  type: boolean
                  default: false
                  description: If true, the organization claims ownership of this wallet. Combined with an approved org, this makes the wallet compliant without individual KYC.
            example:
              publicKey: '9Qx7r...'
              blockchain: 'solana'
              claimOwnership: true
      responses:
        '200':
          description: Wallet registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Wallet'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Organization not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

