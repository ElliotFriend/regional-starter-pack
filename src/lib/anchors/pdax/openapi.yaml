  /pdax-institution/v1/trade:
    post:
      summary: POST Order
      tags:
        - Trade
      operationId: post_order
      description:
        Place a market order using the firm quote reference. To check if the order has been completed, use the
        Get Order Status endpoint.
      security:
        - bearerAuth: []
          idToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                quote_id:
                  type: string
                  description: Firm quote reference ID
                side:
                  type: string
                  description: Describes the side of the trade; this is dependent on the value of the side from Get Firm Quote
                idempotency_id:
                  type: string
                  description:
                    'Id of the request made. You may generate an idempotency id by using uuid ver 4 format  Sample
                    here: https://www.uuidgenerator.net/version4'
      responses:
        '200':
          description: Schema of Response Payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  order_id:
                    type: number
                    description: Id of the order
                  status:
                    type: string
                    description: 'Possible Values : successful, failed'
                  quote_currency:
                    type: string
                    description:
                      If side is 'Buy' Quote currency is the asset you want to receive If side is 'Sell' Quote
                      currency is the asset you want to sell
                  base_currency:
                    type: string
                    description:
                      If side is 'Buy' Base currency is the asset you want to sell If side is 'Sell' Base currency
                      is the asset you want to receive
                  side:
                    type: string
                    description: Counterparty side
                  base_quantity:
                    type: number
                    description: Order quantity as per firm quote
                  price:
                    type: number
                    description: Quoted unit price
                  total_amount:
                    type: number
                    description: Total amount
        4XX:
          description: "Error responses


            - `OT010000`: Unauthorized access

            - `OT010001`: Request has been made several times

            - `OT010002`: Failed to acquire database lock

            - `OT010003`: ${resource} cannot be found or has been expire

            - `OT010004`: ${resource} cannot be updated for some reason

            - `OT010005`: Retrieval of ${userid}'s wallet failed

            - `OT010006`: Insufficient ${asset} Balance

            - `OT010007`: ${resource} cannot be created for some reason.

            - `OT010008`: Cannot hold specified amounts

            - `OT010009`: Cannot hold specified amounts

            - `OT010010`: Cannot create specified entries

            - `OT010011`: Cannot create specified entries

            - `OT010012`: Cannot reverse hold specified amounts

            - `OT010013`: Cannot reverse hold specified amounts

            - `OT010014`: Invalid quantity step : ${step}

