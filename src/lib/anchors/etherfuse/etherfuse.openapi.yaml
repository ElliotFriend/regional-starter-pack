                  description: Type of quote (onramp - fiat to crypto)
                sourceAsset:
                  type: string
                  enum: [MXN]
                  description: Source asset code (fiat currency)
                targetAsset:
                  type: string
                  description: Target asset identifier with issuer (e.g., USDC:GA5ZSEJYB37JRC5AVCIA5MOP4RHTM335X2KGX3IHOJAPP5RE34K4KZVN)
              required:
                - type
                - sourceAsset
                - targetAsset
            - type: object
              title: Offramp
              properties:
                type:
                  type: string
                  enum: [offramp]
                  description: Type of quote (offramp - crypto to fiat)
                sourceAsset:
                  type: string
                  description: Source asset identifier with issuer (e.g., USDC:GA5ZSEJYB37JRC5AVCIA5MOP4RHTM335X2KGX3IHOJAPP5RE34K4KZVN)
                targetAsset:
                  type: string
                  enum: [MXN]
                  description: Target asset code (fiat currency)
              required:
                - type
                - sourceAsset
                - targetAsset
            - type: object
              title: Swap
              properties:
                type:
                  type: string
                  enum: [swap]
                  description: Type of quote (swap - crypto to crypto)
                sourceAsset:
                  type: string
                  description: Source asset identifier with issuer (e.g., USDC:GA5ZSEJYB37JRC5AVCIA5MOP4RHTM335X2KGX3IHOJAPP5RE34K4KZVN)
                targetAsset:
                  type: string
                  description: Target asset identifier with issuer (e.g., CETES:GCRYUGD5NVARGXT56XEZI5CIFCQETYHAPQQTHO203IQZTHDHH4LATMYWC)
              required:
                - type
                - sourceAsset
                - targetAsset
          discriminator:
            propertyName: type
        sourceAmount:
          type: string
          description: Amount of the source asset
        destinationAmount:
          type: string
          description: Amount of the destination asset after conversion
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the quote was created
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the quote was last updated
        expiresAt:
          type: string
          format: date-time
          description: Timestamp when the quote expires
        exchangeRate:
          type: string
          description: >-
            Fee-inclusive exchange rate between source and destination assets.
            This is the rate the user will actually receive — fees are already
            reflected in this rate. Multiply by sourceAmount to get
            destinationAmount.
        etherfuseMidMarketRate:
          type: string
          nullable: true
          description: >-
            Raw mid-market rate before fees. For stablebond ramps, this is the
            bond price. For FX ramps, this is the forex mid-market rate between
            the underlying fiat currencies.
        feeBps:
          type: string
          nullable: true
          description: Fee in basis points (e.g., "20" = 0.20%)
        feeAmount:
          type: string
          nullable: true
          description: Fee amount in source asset currency
        destinationAmountAfterFee:
          type: string
          nullable: true
          description: Amount the user actually receives after fees are deducted
        partnerFeeBps:
          type: integer
          nullable: true
          description: Partner fee in basis points applied to this quote (e.g., 100 = 1.00%). Only present when a partner fee is configured for the requesting organization.
        partnerFeeAmount:
          type: string
          nullable: true
          description: Partner fee amount in source asset currency. Only present when a partner fee is configured.
      required:
        - quoteId
        - blockchain
        - quoteAssets
        - sourceAmount
        - destinationAmount
        - createdAt
        - updatedAt
        - expiresAt
        - exchangeRate
      examples:
