openapi: 3.1.0
info:
  title: FX API
  version: 1.0.0
  description: |
    API for managing FX operations including onboarding, quotes, orders, and customer management.
    This API provides endpoints for managing customers, bank accounts, crypto wallets, orders, and webhooks.

servers:
  - url: https://api.etherfuse.com
    description: Production API
  - url: https://api.sand.etherfuse.com
    description: Sandbox API (for testing)

tags:
  - name: Lookup
    description: Public endpoints for looking up stablebond and exchange rate data
  - name: Assets
    description: Get available assets for ramping
  - name: Onboarding
    description: Customer onboarding and KYC
  - name: Bank Accounts
    description: Manage customer bank accounts
  - name: Agreements
    description: Handle customer agreements and consents
  - name: Quotes
    description: Get quotes for conversions
  - name: Orders
    description: Create and manage orders
  - name: Swaps
    description: Create and manage swaps
  - name: Customers
    description: Manage customers
  - name: Crypto Wallets
    description: Manage crypto wallets
  - name: Webhooks
    description: Manage webhook subscriptions
  - name: Organizations
    description: Manage organizations and child organizations

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
      description: 'API key for authentication. Pass the key directly (e.g., `Authorization: your-api-key`). Do not use a `Bearer` prefix.'

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          description: Error message
      example:
        error: 'Invalid request parameters'

    RampableAsset:
      type: object
      properties:
        symbol:
          type: string
          description: Token symbol (e.g., "CETES", "USDC")
        identifier:
          type: string
          description: Chain-specific identifier to use in quotes (e.g., "CETES:GCRYUGD5..." for Stellar)
        name:
          type: string
          description: Display name for the asset
        currency:
          type: string
          description: The fiat currency this asset is associated with (e.g., "mxn" for CETES, "usd" for USDC)
        balance:
          type: string
          nullable: true
          description: Balance in the wallet (if available)
        image:
          type: string
          nullable: true
          description: Image URL for the asset

    Customer:
      type: object
      properties:
        customerId:
          type: string
          format: uuid
          description: Unique identifier for the customer
        displayName:
          type: string
          nullable: true
          description: Display name of the customer
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the customer was created
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the customer was last updated
      example:
        customerId: '123e4567-e89b-12d3-a456-426614174000'
        displayName: 'John Doe'
        createdAt: '2024-01-01T00:00:00Z'
        updatedAt: '2024-01-01T00:00:00Z'

    BankAccount:
      type: object
      properties:
        bankAccountId:
          type: string
          format: uuid
          description: Unique identifier for the bank account. Must be a valid UUID v4.
        customerId:
          type: string
          format: uuid
          description: ID of the customer who owns this bank account
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the bank account was created
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the bank account was last updated
        deletedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the bank account was deleted (if applicable)
        abbrClabe:
          type: string
          description: Abbreviated CLABE number for the bank account
        etherfuseDepositClabe:
          type: string
          nullable: true
          description: Etherfuse deposit CLABE number
        label:
          type: string
          nullable: true
          description: Custom label for the bank account
        compliant:
          type: boolean
          description: Whether the bank account is compliant. This is a derived value — true if the account has been explicitly marked compliant OR if the owning organization is approved (KYB'd).
        status:
          type: string
          enum: [pending, awaitingDepositVerification, active, inactive]
          description: Current status of the bank account
      example:
        bankAccountId: '123e4567-e89b-12d3-a456-426614174000'
        customerId: '123e4567-e89b-12d3-a456-426614174001'
        createdAt: '2024-01-01T00:00:00Z'
        updatedAt: '2024-01-01T00:00:00Z'
        abbrClabe: '1234...5678'
        compliant: true
        status: 'active'

    Wallet:
      type: object
      properties:
        walletId:
          type: string
          format: uuid
          description: Unique identifier for the wallet
        customerId:
          type: string
          format: uuid
          description: ID of the customer who owns this wallet
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the wallet was created
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the wallet was last updated
        deletedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the wallet was deleted (if applicable)
        displayName:
          type: string
          nullable: true
          description: Display name for the wallet
        publicKey:
          type: string
          description: Public key of the wallet
        blockchain:
          type: string
          enum: [solana, stellar, base, polygon, monad]
          description: Blockchain type
        isAuthenticated:
          type: boolean
          description: Whether the wallet is authenticated
        kycStatus:
          type: string
          nullable: true
          description: Current KYC verification status for the wallet. The `approved_chain_deploying` status indicates the user is approved but waiting for on-chain marking (Solana only).
          enum: [not_started, proposed, approved, approved_chain_deploying, rejected]
        kycOnChain:
          type: boolean
          nullable: true
          description: Whether KYC is marked on-chain for the wallet. Only present for Solana wallets; for other blockchain types this field is omitted as on-chain KYC marking does not apply.
        claimedOwnership:
          type: boolean
          nullable: true
          description: Whether the wallet has active claimed ownership by the organization. When true and the organization is approved, the wallet is treated as compliant without requiring individual KYC. Only present when claimed ownership has been set.
      example:
        walletId: '123e4567-e89b-12d3-a456-426614174000'
        customerId: '123e4567-e89b-12d3-a456-426614174001'
        createdAt: '2024-01-01T00:00:00Z'
        updatedAt: '2024-01-01T00:00:00Z'
        publicKey: '9Qx7r...'
        blockchain: 'solana'
        isAuthenticated: true
        kycStatus: 'approved'
        kycOnChain: true
        claimedOwnership: true

    CreateOrderResponse:
      type: object
      description: |
        Response when creating an order. The response is wrapped in either an "onramp" or "offramp" key
        depending on the order direction (derived from the quote).
      oneOf:
        - type: object
          title: Onramp Response
          properties:
            onramp:
              type: object
              properties:
                orderId:
                  type: string
                  format: uuid
                  description: Unique identifier for the order
                depositClabe:
                  type: string
                  description: CLABE number where customer should deposit MXN
                depositAmount:
                  type: number
                  format: decimal
                  description: Amount in MXN the customer should deposit
                depositBankName:
                  type: string
                  description: Bank that holds the deposit CLABE (e.g. "STP")
                depositAccountHolder:
                  type: string
                  description: Account holder name for the deposit CLABE (e.g. "Etherfuse MX")
        - type: object
          title: Offramp Response
          properties:
            offramp:
              type: object
              properties:
                orderId:
                  type: string
                  format: uuid
                  description: Unique identifier for the order
                withdrawAnchorAccount:
                  type: string
                  nullable: true
                  description: 'Stellar anchor account address to send payment to (only present when useAnchor is true)'
                withdrawMemo:
                  type: string
                  nullable: true
                  description: 'Base64-encoded hash memo to include in the payment transaction (only present when useAnchor is true)'
                withdrawMemoType:
                  type: string
                  nullable: true
                  description: 'Memo type — always "hash" for anchor orders (only present when useAnchor is true)'
      examples:
        onramp:
          summary: Onramp order response
          value:
            onramp:
              orderId: '123e4567-e89b-12d3-a456-426614174000'
              depositClabe: '646180157034567890'
              depositAmount: 1000.00
              depositBankName: 'STP'
              depositAccountHolder: 'Etherfuse MX'
        offramp:
          summary: Offramp order response
          value:
            offramp:
              orderId: '123e4567-e89b-12d3-a456-426614174000'
        offramp_anchor:
          summary: Offramp anchor order response (Stellar only)
          value:
            offramp:
              orderId: '123e4567-e89b-12d3-a456-426614174000'
              withdrawAnchorAccount: 'GABPM7AXXSE27X3NIN5IVSFCW5AWQLF3RFGUZCW3USNFRZCHLU6CC3SN'
              withdrawMemo: 'RkFLRU1FTU8xMjM0NTY3ODkw...'
              withdrawMemoType: 'hash'

    Order:
      type: object
      description: |
        Order object returned in webhooks and when fetching order details.
        This is the payload you'll receive in `order_updated` webhook events.
      properties:
        orderId:
          type: string
          format: uuid
          description: Unique identifier for the order
        customerId:
          type: string
          format: uuid
          description: Organization ID associated with the order. In webhook payloads, this is the recipient organization's ID.
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the order was created
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the order was last updated
        deletedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the order was deleted (if applicable)
        completedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the order was completed
        amountInFiat:
          type: number
          format: decimal
          nullable: true
          description: Amount in fiat currency (MXN)
        amountInTokens:
          type: number
          format: decimal
          nullable: true
          description: Amount in crypto tokens
        confirmedTxSignature:
          type: string
          nullable: true
          description: Blockchain transaction hash when crypto transfer is confirmed
        walletId:
          type: string
          format: uuid
          description: ID of the wallet used for the order
        bankAccountId:
          type: string
          format: uuid
          description: ID of the bank account used for the order
        burnTransaction:
          type: string
          nullable: true
          description: Encoded transaction for the user to sign (offramp orders)
        isAnchorOrder:
          type: boolean
          nullable: true
          description: 'Whether this order uses anchor mode (Stellar only)'
        withdrawAnchorAccount:
          type: string
          nullable: true
          description: 'Stellar anchor account address to send payment to (anchor mode only)'
        withdrawMemo:
          type: string
          nullable: true
          description: 'Base64-encoded hash memo to include in the payment (anchor mode only)'
        withdrawMemoType:
          type: string
          nullable: true
          description: 'Memo type for anchor payments — always "hash" (anchor mode only)'
        memo:
          type: string
          nullable: true
          description: Optional memo for the order
        depositClabe:
          type: string
          nullable: true
          description: CLABE number for deposit (onramp orders only)
        depositBankName:
          type: string
          nullable: true
          description: Bank that holds the deposit CLABE, e.g. "STP" (onramp orders only)
        depositAccountHolder:
          type: string
          nullable: true
          description: Account holder name for the deposit CLABE, e.g. "Etherfuse MX" (onramp orders only)
        orderType:
          type: string
          enum: [onramp, offramp]
          description: Type of the order
        status:
          type: string
          enum: [created, funded, completed, finalized, failed, refunded, canceled]
          description: Current status of the order. For offramps, `completed` means fiat has been sent to the customer. `finalized` means the reversal window has passed and the funds cannot be returned.
        statusPage:
          type: string
          format: uri
          description: URL to an Etherfuse-branded page where the customer can view order status and sign transactions (for offramps). Can be used as an alternative to handling transaction signing in your application.
        feeBps:
          type: integer
          nullable: true
          description: Fee in basis points (e.g., 20 = 0.20%)
        feeAmountInFiat:
          type: number
          format: decimal
          nullable: true
          description: Actual fee amount collected in fiat currency
        exchangeRate:
          type: string
          nullable: true
          description: >-
            Fee-inclusive exchange rate between source and target assets at the
            time of order creation. This is the rate the user actually received.
            For example, if a user exchanged MXN for CETES with a fee, this
            reflects the rate after the fee was applied. Null for historical
            orders created before this field was added.
        etherfuseMidMarketRate:
          type: string
          nullable: true
          description: >-
            Raw mid-market rate before fees. For stablebond ramps, this is the
            bond price (e.g., MXN per CETE). For FX ramps, this is the forex
            mid-market rate between the underlying fiat currencies. Null for
            historical orders.
        sourceAsset:
          type: string
          nullable: true
          description: >-
            Source asset identifier for this order. For onramps, this is the
            fiat currency (e.g., "MXN"). For offramps, this is the crypto
            asset identifier.
        targetAsset:
          type: string
          nullable: true
          description: >-
            Target asset identifier for this order. For onramps, this is the
            crypto asset identifier. For offramps, this is the fiat currency
            (e.g., "MXN").
        stellarClaimableBalanceId:
          type: string
          nullable: true
          description: |
            Stellar claimable balance ID (hex). Present on completed Stellar onramp orders
            where the wallet required setup (no account or no trustline). The user must
            sign a claim transaction to receive their tokens. See `stellarClaimTransaction`.
        stellarClaimTransaction:
          type: string
          nullable: true
          description: |
            Unsigned Stellar transaction XDR (base64-encoded). Present on completed Stellar
            onramp orders that used the claimable balance flow. Contains `ChangeTrust` and
            `ClaimClaimableBalance` operations. The user signs this with their wallet and
            submits it to Horizon to add the trustline and claim their tokens in one step.
        partnerFeeBps:
          type: integer
          nullable: true
          description: Partner fee in basis points applied to this order (e.g., 100 = 1.00%). Only present when a partner fee was configured at quote time.
        partnerFeeAmountFiat:
          type: number
          format: decimal
          nullable: true
          description: Partner fee amount collected in fiat currency. Derived from the total fee using the partner fee ratio.
        partnerFeeStatus:
          type: string
          enum: [none, pending, disbursed]
          nullable: true
          description: |
            Disbursement status of the partner fee. Only present when `partnerFeeBps` > 0.
            - `none` — Order not yet completed
            - `pending` — Order completed, partner fee awaiting offline disbursement
            - `disbursed` — Partner fee has been paid out

    Webhook:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the webhook
        eventType:
          type: string
          enum:
            [
              bank_account_updated,
              customer_updated,
              order_updated,
              quote_updated,
              swap_updated,
              kyc_updated,
            ]
          description: Type of event the webhook is subscribed to
        url:
          type: string
          format: uri
          description: URL where webhook events will be sent
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the webhook was created
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the webhook was last updated
      example:
        id: '123e4567-e89b-12d3-a456-426614174000'
        eventType: 'order_updated'
        url: 'https://example.com/webhook'
        createdAt: '2024-01-01T00:00:00Z'
        updatedAt: '2024-01-01T00:00:00Z'

    WebhookEvent:
      type: object
      description: |
        Webhook payload sent to your registered webhook URL.
        The payload is signed with HMAC-SHA256 using your webhook secret.
        Signature is in the `X-Signature` header as `sha256={hex_signature}`.

        The payload uses a tagged format where the event type is the key and the data is the value:
        - `{"order_updated": {...}}` for order events
        - `{"swap_updated": {...}}` for swap events
        - `{"customer_updated": {...}}` for customer events
        - `{"bank_account_updated": {...}}` for bank account events

        The `status` field inside the data indicates the specific state (e.g., "created", "funded", "completed", "finalized").

        For `order_updated` events, all organizations involved in the order receive their own webhook delivery with `customerId` set to the recipient organization's ID.
      properties:
        order_updated:
          $ref: '#/components/schemas/Order'
        swap_updated:
          $ref: '#/components/schemas/SwapResponse'
        customer_updated:
          $ref: '#/components/schemas/Customer'
        bank_account_updated:
          $ref: '#/components/schemas/BankAccount'
      examples:
        order_created:
          summary: Onramp order created
          value:
            order_updated:
              orderId: '123e4567-e89b-12d3-a456-426614174000'
              customerId: '123e4567-e89b-12d3-a456-426614174001'
              walletId: '223e4567-e89b-12d3-a456-426614174002'
              bankAccountId: '323e4567-e89b-12d3-a456-426614174003'
              orderType: 'onramp'
              status: 'created'
              amountInFiat: 1000.00
              depositClabe: '646180157034567890'
              depositBankName: 'STP'
              depositAccountHolder: 'Etherfuse MX'
              createdAt: '2025-01-15T10:00:00Z'
              updatedAt: '2025-01-15T10:00:00Z'
              statusPage: 'https://status.etherfuse.com/order/123e4567-e89b-12d3-a456-426614174000'
        order_funded:
          summary: Onramp order funded (fiat received)
          value:
            order_updated:
              orderId: '123e4567-e89b-12d3-a456-426614174000'
              customerId: '123e4567-e89b-12d3-a456-426614174001'
              walletId: '223e4567-e89b-12d3-a456-426614174002'
              bankAccountId: '323e4567-e89b-12d3-a456-426614174003'
              orderType: 'onramp'
              status: 'funded'
              amountInFiat: 1000.00
              amountInTokens: 49.50
              depositClabe: '646180157034567890'
              depositBankName: 'STP'
              depositAccountHolder: 'Etherfuse MX'
              feeBps: 20
              feeAmountInFiat: 2.00
              exchangeRate: '0.0495'
              etherfuseMidMarketRate: '0.0497'
              sourceAsset: 'MXN'
              targetAsset: 'USDC:GA5ZSEJYB37JRC5AVCIA5MOP4RHTM335X2KGX3IHOJAPP5RE34K4KZVN'
              createdAt: '2025-01-15T10:00:00Z'
              updatedAt: '2025-01-15T10:05:00Z'
              statusPage: 'https://status.etherfuse.com/order/123e4567-e89b-12d3-a456-426614174000'
        order_completed:
          summary: Onramp order completed (crypto sent)
          value:
            order_updated:
              orderId: '123e4567-e89b-12d3-a456-426614174000'
              customerId: '123e4567-e89b-12d3-a456-426614174001'
              walletId: '223e4567-e89b-12d3-a456-426614174002'
              bankAccountId: '323e4567-e89b-12d3-a456-426614174003'
              orderType: 'onramp'
              status: 'completed'
              amountInFiat: 1000.00
              amountInTokens: 49.50
              confirmedTxSignature: '3Kz8V2x...abc123'
              depositClabe: '646180157034567890'
              depositBankName: 'STP'
              depositAccountHolder: 'Etherfuse MX'
              feeBps: 20
              feeAmountInFiat: 2.00
              exchangeRate: '0.0495'
              etherfuseMidMarketRate: '0.0497'
              sourceAsset: 'MXN'
              targetAsset: 'USDC:GA5ZSEJYB37JRC5AVCIA5MOP4RHTM335X2KGX3IHOJAPP5RE34K4KZVN'
              createdAt: '2025-01-15T10:00:00Z'
              updatedAt: '2025-01-15T10:10:00Z'
              completedAt: '2025-01-15T10:10:00Z'
              statusPage: 'https://status.etherfuse.com/order/123e4567-e89b-12d3-a456-426614174000'
        offramp_created:
          summary: Offramp order created (waiting for crypto)
          value:
            order_updated:
              orderId: '423e4567-e89b-12d3-a456-426614174000'
              customerId: '123e4567-e89b-12d3-a456-426614174001'
              walletId: '223e4567-e89b-12d3-a456-426614174002'
              bankAccountId: '323e4567-e89b-12d3-a456-426614174003'
              orderType: 'offramp'
              status: 'created'
              amountInTokens: 50.00
              burnTransaction: 'AQAAAA...encoded_tx'
              exchangeRate: '20.10'
              etherfuseMidMarketRate: '20.14'
              sourceAsset: 'USDC:GA5ZSEJYB37JRC5AVCIA5MOP4RHTM335X2KGX3IHOJAPP5RE34K4KZVN'
              targetAsset: 'MXN'
              createdAt: '2025-01-15T10:00:00Z'
              updatedAt: '2025-01-15T10:00:00Z'
              statusPage: 'https://status.etherfuse.com/order/423e4567-e89b-12d3-a456-426614174000'
        swap_created:
          summary: Swap created (waiting for user to sign)
          value:
            swap_updated:
              orderId: '523e4567-e89b-12d3-a456-426614174000'
              customerId: '123e4567-e89b-12d3-a456-426614174001'
              sendTransaction: 'AQAAAA...encoded_transaction_for_user_to_sign'
              sendTransactionHash: ''
              status: 'created'
              createdAt: '2025-01-15T10:00:00Z'
              updatedAt: '2025-01-15T10:00:00Z'
        swap_completed:
          summary: Swap completed
          value:
            swap_updated:
              orderId: '523e4567-e89b-12d3-a456-426614174000'
              customerId: '123e4567-e89b-12d3-a456-426614174001'
              sendTransaction: 'AQAAAA...encoded_tx'
              sendTransactionHash: '4Lz9W3yZn0...def456'
              receiveTransactionHash: '5Mz0X4zAo1...ghi789'
              status: 'completed'
              createdAt: '2025-01-15T10:00:00Z'
              updatedAt: '2025-01-15T10:02:00Z'

    PagedRequest:
      type: object
      properties:
        filters:
          type: object
          nullable: true
          description: Optional filters for the request
        pageSize:
          type: integer
          minimum: 1
          maximum: 100
          description: Number of items per page
        pageNumber:
          type: integer
          minimum: 0
          description: Page number (0-based)
      example:
        pageSize: 10
        pageNumber: 0

    PagedResponse:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
          description: Array of items in the current page
        totalItems:
          type: integer
          description: Total number of items
        pageSize:
          type: integer
          description: Number of items per page
        pageNumber:
          type: integer
          description: Current page number
        totalPages:
          type: integer
          description: Total number of pages
      example:
        items: []
        totalItems: 0
        pageSize: 10
        pageNumber: 0
        totalPages: 0

    PresignedUrlPayload:
      type: object
      description: |
        Payload containing a presigned URL for user authentication.
        The presigned URL serves as the authentication mechanism for the end user and contains
        cryptographically signed claims (customer ID, wallet public key, organization ID).
      properties:
        presignedUrl:
          type: string
          description: |
            Presigned URL obtained from `POST /ramp/onboarding-url`. This URL authenticates
            the end user and authorizes actions on their behalf.
      required:
        - presignedUrl
      example:
        presignedUrl: 'https://devnet.etherfuse.com/onboarding?token=eyJhbGciOiJIUzI1NiIs...'

    CustomerAgreementPayload:
      type: object
      description: |
        Payload for accepting the customer agreement. The presigned URL authenticates the end user
        who will be bound by the agreement.
      properties:
        presignedUrl:
          type: string
          description: |
            Presigned URL obtained from `POST /ramp/onboarding-url`. This URL authenticates
            the end user and authorizes them to accept the agreement.
        customerInfo:
          type: object
          nullable: true
          description: |
            Optional customer information. When using programmatic KYC, this field may be omitted
            since identity data was already submitted via the KYC endpoints.
      required:
        - presignedUrl
      example:
        presignedUrl: 'https://devnet.etherfuse.com/onboarding?token=eyJhbGciOiJIUzI1NiIs...'

    AgreementResponse:
      type: object
      description: Response confirming an agreement has been recorded
      properties:
        success:
          type: boolean
          description: Whether the agreement was successfully recorded
        acceptedAt:
          type: string
          format: date-time
          description: Timestamp when the agreement was accepted
        agreementType:
          type: string
          description: Type of agreement accepted
          enum: [electronic_signature, terms_and_conditions, customer_agreement]
      example:
        success: true
        acceptedAt: '2024-01-15T10:00:00Z'
        agreementType: 'customer_agreement'

    UserInfo:
      type: object
      description: |
        Optional info about the end user (the individual customer behind a personal organization).

        **Recommended.** When provided, Etherfuse pre-creates the user record so that when the
        customer eventually signs in via the hosted onboarding UI their Firebase identity attaches
        to the right user. It also enables personalized status-change emails (KYC approved/rejected,
        bank account verified, etc.).

        **Will eventually be required** for personal organizations. Reject early in your integration
        if you don't have this data — partners that don't migrate before the cutover will start
        receiving 400 errors.
      required:
        - email
        - displayName
      properties:
        email:
          type: string
          format: email
          description: End user's email address.
        displayName:
          type: string
          description: End user's display name.
      example:
        email: 'ana@example.com'
        displayName: 'Ana García'

    GenerateOnboardingUrlPayload:
      type: object
      required:
        - customerId
        - bankAccountId
        - publicKey
        - blockchain
      properties:
        customerId:
          type: string
          format: uuid
          description: Customer ID. This id is generated by you, the API consumer, and provided to etherfuse as a way to associate this customer with your organization.
        bankAccountId:
          type: string
          format: uuid
          description: Bank account ID. This id is generated by you, the API consumer, and provided to etherfuse as a way to associate this bank account with the customer.
        publicKey:
          type: string
          description: Public key for the customer wallet
        blockchain:
          type: string
          enum: [solana, stellar, base, polygon, monad]
          description: Blockchain type for the wallet
        userInfo:
          $ref: '#/components/schemas/UserInfo'
      example:
        customerId: '123e4567-e89b-12d3-a456-426614174000'
        bankAccountId: '123e4567-e89b-12d3-a456-426614174001'
        publicKey: '9Qx7r...'
        blockchain: 'solana'
        userInfo:
          email: 'ana@example.com'
          displayName: 'Ana García'

    OrderPreviewPayload:
      type: object
      properties:
        amountFiat:
          type: number
          format: decimal
          nullable: true
          description: Amount in fiat currency
        amountCrypto:
          type: number
          format: decimal
          nullable: true
          description: Amount in crypto currency
        direction:
          type: string
          enum: [onramp, offramp]
          description: Transaction direction
      example:
        amountFiat: 100.00
        direction: 'onramp'

    CreateOrderPayload:
      type: object
      required:
        - orderId
        - bankAccountId
        - quoteId
      properties:
        orderId:
          type: string
          format: uuid
          description: Client-generated order ID
        bankAccountId:
          type: string
          format: uuid
          description: Bank account ID for the fiat leg
        publicKey:
          type: string
          nullable: true
          description: Customer's crypto wallet address. Required if `cryptoWalletId` is not provided.
        cryptoWalletId:
          type: string
          format: uuid
          nullable: true
          description: UUID of a registered crypto wallet. If provided, `publicKey` is optional and will be resolved from the wallet record.
        quoteId:
          type: string
          format: uuid
          description: Quote ID from a previous /ramp/quote call. The order will use the blockchain, direction, and amounts from the quote.
        memo:
          type: string
          nullable: true
          description: Optional memo for the transaction
        useAnchor:
          type: boolean
          default: false
          description: |
            When `true`, the order uses **anchor mode** (Stellar only). Instead of returning a pre-signed `burnTransaction`,
            the response includes `withdrawAnchorAccount`, `withdrawMemo`, and `withdrawMemoType`. Your application builds
            and submits the payment transaction directly to the anchor account with the provided memo.

            Only valid for **Stellar offramp** orders. Requests with `useAnchor: true` on non-Stellar blockchains will be rejected.
      example:
        orderId: '123e4567-e89b-12d3-a456-426614174000'
        bankAccountId: '123e4567-e89b-12d3-a456-426614174001'
        publicKey: 'GDUKMGUGD3V6VXTU2RLAUM7A2FABLMHCPWTMDHKP7HHJ6FCZKEY4PVWL'
        quoteId: '844393ca-be57-4817-a58a-5b60e2792c06'

    QuoteRequest:
      type: object
      properties:
        quoteId:
          type: string
          format: uuid
          description: Unique identifier for the quote
        customerId:
          type: string
          format: uuid
          description: ID of the customer requesting the quote
        blockchain:
          type: string
          enum: [stellar, solana, base, polygon, monad]
          description: Blockchain for the quote
        quoteAssets:
          oneOf:
            - type: object
              title: Onramp
              properties:
                type:
                  type: string
                  enum: [onramp]
                  description: Type of quote (onramp - fiat to crypto)
                sourceAsset:
                  type: string
                  enum: [MXN]
                  description: Source asset code (fiat currency)
                targetAsset:
                  type: string
                  description: Target asset identifier with issuer (e.g., USDC:GA5ZSEJYB37JRC5AVCIA5MOP4RHTM335X2KGX3IHOJAPP5RE34K4KZVN)
              required:
                - type
                - sourceAsset
                - targetAsset
            - type: object
              title: Offramp
              properties:
                type:
                  type: string
                  enum: [offramp]
                  description: Type of quote (offramp - crypto to fiat)
                sourceAsset:
                  type: string
                  description: Source asset identifier with issuer (e.g., USDC:GA5ZSEJYB37JRC5AVCIA5MOP4RHTM335X2KGX3IHOJAPP5RE34K4KZVN)
                targetAsset:
                  type: string
                  enum: [MXN]
                  description: Target asset code (fiat currency)
              required:
                - type
                - sourceAsset
                - targetAsset
            - type: object
              title: Swap
              properties:
                type:
                  type: string
                  enum: [swap]
                  description: Type of quote (swap - crypto to crypto)
                sourceAsset:
                  type: string
                  description: Source asset identifier with issuer (e.g., USDC:GA5ZSEJYB37JRC5AVCIA5MOP4RHTM335X2KGX3IHOJAPP5RE34K4KZVN)
                targetAsset:
                  type: string
                  description: Target asset identifier with issuer (e.g., CETES:GCRYUGD5NVARGXT56XEZI5CIFCQETYHAPQQTHO203IQZTHDHH4LATMYWC)
              required:
                - type
                - sourceAsset
                - targetAsset
          discriminator:
            propertyName: type
          description: Quote assets configuration based on quote type
        sourceAmount:
          type: string
          description: Amount of the source asset
        walletAddress:
          type: string
          nullable: true
          description: |
            Public key of the destination wallet. Optional but recommended for Stellar onramps.
            When provided for Stellar onramp quotes, the system checks whether the wallet has an
            on-chain account and trustline. If setup is needed (new account or missing trustline),
            the fee will include a one-time onboarding cost to fund the wallet. Without this field,
            the quote assumes the wallet is already set up.
        partnerFeeBps:
          type: integer
          minimum: 0
          maximum: 500
          description: |
            Optional partner fee override in basis points (0–500). If provided, this value is used
            as the partner fee for this quote instead of the organization's default. Only applies
            when the organization has partner fees enabled.
      required:
        - quoteId
        - customerId
        - blockchain
        - quoteAssets
        - sourceAmount
      examples:
        onramp_mxn_to_usdc:
          summary: Onramp MXN to USDC
          value:
            quoteId: '844393ca-be57-4817-a58a-5b60e2792c10'
            customerId: '34fcc67a-2454-4578-8435-e2bf03b4dc30'
            blockchain: 'stellar'
            quoteAssets:
              type: 'onramp'
              sourceAsset: 'MXN'
              targetAsset: 'USDC:GA5ZSEJYB37JRC5AVCIA5MOP4RHTM335X2KGX3IHOJAPP5RE34K4KZVN'
            sourceAmount: '1000'
        onramp_stellar_new_wallet:
          summary: Onramp MXN to USDC (new Stellar wallet)
          value:
            quoteId: 'd44393ca-be57-4817-a58a-5b60e2792c15'
            customerId: '34fcc67a-2454-4578-8435-e2bf03b4dc30'
            blockchain: 'stellar'
            quoteAssets:
              type: 'onramp'
              sourceAsset: 'MXN'
              targetAsset: 'USDC:GA5ZSEJYB37JRC5AVCIA5MOP4RHTM335X2KGX3IHOJAPP5RE34K4KZVN'
            sourceAmount: '1000'
            walletAddress: 'GDUKMGUGD3V6VXTU2RLAUM7A2FABLMHCPWTMDHKP7HHJ6FCZKEY4PVWL'
        onramp_mxn_to_cetes:
          summary: Onramp MXN to CETES
          value:
            quoteId: '944393ca-be57-4817-a58a-5b60e2792c11'
            customerId: '34fcc67a-2454-4578-8435-e2bf03b4dc30'
            blockchain: 'stellar'
            quoteAssets:
              type: 'onramp'
              sourceAsset: 'MXN'
              targetAsset: 'CETES:GCRYUGD5NVARGXT56XEZI5CIFCQETYHAPQQTHO203IQZTHDHH4LATMYWC'
            sourceAmount: '1000'
        offramp_usdc_to_mxn:
          summary: Offramp USDC to MXN
          value:
            quoteId: 'a44393ca-be57-4817-a58a-5b60e2792c12'
            customerId: '34fcc67a-2454-4578-8435-e2bf03b4dc30'
            blockchain: 'stellar'
            quoteAssets:
              type: 'offramp'
              sourceAsset: 'USDC:GA5ZSEJYB37JRC5AVCIA5MOP4RHTM335X2KGX3IHOJAPP5RE34K4KZVN'
              targetAsset: 'MXN'
            sourceAmount: '50'
        offramp_cetes_to_mxn:
          summary: Offramp CETES to MXN
          value:
            quoteId: 'b44393ca-be57-4817-a58a-5b60e2792c13'
            customerId: '34fcc67a-2454-4578-8435-e2bf03b4dc30'
            blockchain: 'stellar'
            quoteAssets:
              type: 'offramp'
              sourceAsset: 'CETES:GCRYUGD5NVARGXT56XEZI5CIFCQETYHAPQQTHO203IQZTHDHH4LATMYWC'
              targetAsset: 'MXN'
            sourceAmount: '100'
        swap_usdc_to_cetes:
          summary: Swap USDC to CETES
          value:
            quoteId: 'c44393ca-be57-4817-a58a-5b60e2792c14'
            customerId: '34fcc67a-2454-4578-8435-e2bf03b4dc30'
            blockchain: 'stellar'
            quoteAssets:
              type: 'swap'
              sourceAsset: 'USDC:GA5ZSEJYB37JRC5AVCIA5MOP4RHTM335X2KGX3IHOJAPP5RE34K4KZVN'
              targetAsset: 'CETES:GCRYUGD5NVARGXT56XEZI5CIFCQETYHAPQQTHO203IQZTHDHH4LATMYWC'
            sourceAmount: '100'

    QuoteResponse:
      type: object
      properties:
        quoteId:
          type: string
          format: uuid
          description: Unique identifier for the quote
        blockchain:
          type: string
          enum: [stellar, solana, base, polygon, monad]
