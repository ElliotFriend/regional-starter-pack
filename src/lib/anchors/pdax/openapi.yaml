        or `fiat`. To receive both, register twice.
      security:
        - bearerAuth: []
          idToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                event_type:
                  type: string
                  enum:
                    - crypto
                    - fiat
                  description: Which event stream to subscribe to.
                webhook_endpoint:
                  type: string
                  description: Your deployed webhook endpoint.
              required:
                - event_type
                - webhook_endpoint
      responses:
