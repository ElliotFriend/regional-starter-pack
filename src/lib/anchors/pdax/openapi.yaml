    FiatInMethod:
      type: string
      description: |-
        Cash-in method for /fiat/deposit (selects the user-facing payment rail). `Source Wallet` describes who the user pays from; `Mode` is the rail behavior (debit pull vs QR scan).

        | Method | Source Wallet | Mode |
        | --- | --- | --- |
        | grabpay_cashin | Grab | Debit Pull |
        | dragonpay | All dragonpay supported banks | Debit Pull |
        | instapay_upay_cashin | All banks and e-wallets with QRPh enabled | Scan QRPh |
      enum:
        - grabpay_cashin
        - dragonpay
        - instapay_upay_cashin
    FiatOutMethod:
      type: string
      description: Cash-out method for /fiat/withdraw (real-time vs batch bank rail).
      enum:
        - PAY-TO-ACCOUNT-REAL-TIME
        - PAY-TO-ACCOUNT-NON-REAL-TIME
    SourceOfFunds:
      type: string
      enum:
        - Compensation
        - Sale/Income from Property
        - Business Income
        - Pension/Benefit from the Government
        - Gift/Donation
        - Sale/Income from Investment
        - Inheritance/Insurance
        - 'Others: <Free Text>'
    Purpose:
      type: string
      description: Purpose of the transaction (per-txn KYC requirement).
      enum:
        - Business Expense/Employee Remittance
        - Business Transaction
        - Gift
        - Loan
        - Donation of Financial Aid
        - Investments/Savings
        - Purchase of Goods
        - Education and Training
        - Travel Expense
        - Family Support
        - Legal Obligation
    FeeType:
      type: string
      description: Whether the sender or beneficiary bears the fiat-out fee.
      enum:
        - Sender
        - Beneficiary
    Sex:
      type: string
      enum:
        - Male
        - Female
    Relationship:
      type: string
      description: Relationship of sender to beneficiary.
      enum:
        - Spouse/Partner
        - Family
        - Acquaintance
        - Colleague
        - Business
        - Myself
    CryptoWebhookEvent:
      description:
        Payload PDAX POSTs to your registered webhook endpoint when a crypto transaction reaches a terminal status.
        The wrapper PDAX actually sends has a `data` envelope; the fields below describe that inner data object.
      type: object
      properties:
        identifier:
          type: string
          description: Unique identifier supplied by client
        user_id:
          type: string
          description: UUID of the user
        reference_id:
          type: string
          description: reference_id from the Crypto Out response payload
        transaction_type:
          type: string
          description: '"The type of transaction   WITHDRAWAL or DEPOSIT"'
        transaction_hash:
          type: string
          description:
            A transaction hash is a unique identifier generated through cryptographic hashing, representing a specific
            transaction and providing a way to trace and verify its details on the blockchain
        amount:
          type: number
          description: The amount being withdrawn or deposited excluding fees
        fee_amount:
          type: number
          description: The fee amount involved in the transaction
        asset:
          type: string
          description: The crypto currency being withdrawn or deposited
        asset_type:
          type: string
          description: The asset of the transaction, Crypto only
        network:
          type: string
          description: The crypto network used to facilitate the transaction
        source_address:
          type: string
          description: Wallet address of the sender
        source_address_tag:
          type: string
          description: Address tag of the sender
        destination_address:
          type: string
          description: Wallet address of the receiver
        destination_address_tag:
          type: string
          description: Address tag of the receiver
        status:
          type: string
          description: 'Possible values: completed, failed'
    FiatWebhookEvent:
      description:
        Payload PDAX POSTs to your registered webhook endpoint when a fiat transaction reaches a terminal status.
        The wrapper PDAX actually sends has a `data` envelope; the fields below describe that inner data object.
      type: object
      properties:
        identifier:
          type: string
          description: Unique identifier supplied by client
        user_id:
          type: string
          description: UUID of the user
        request_id:
          type: string
          description: Request ID of the transaction
        reference_number:
          type: string
          description: reference_number from the Fiat Out response payload
        amount:
          type: number
          description: The amount being withdrawn or deposited excluding fees
        asset:
          type: string
          description: The fiat currency being withdrawn or deposited
        asset_type:
          type: string
          description: The asset of the transaction, PHP only
        transaction_type:
          type: string
          description: The type of transaction WITHDRAWAL or DEPOSIT
        status:
          type: string
          description: 'Possible values: IN-PROGRESS, COMPLETED, FAILED'
        method:
          type: string
          description: The method of which was used for the transaction
        fee:
          type: number
          description: The deposit or withdrawal fee involved in the transaction
  responses:
    PdaxError400:
      description: |-
        Bad request. Possible codes:
        - `PAP0400` (BadRequest): Bad request
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ErrorEnvelope'
              - type: object
                properties:
                  code:
                    type: string
                    enum:
                      - PAP0400
    PdaxError401:
      description: |-
        Unauthorized — invalid or expired token. Possible codes:
        - `PAP0401` (Unauthorize): Unauthorize
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ErrorEnvelope'
              - type: object
                properties:
                  code:
                    type: string
                    enum:
                      - PAP0401
    PdaxError500:
      description: |-
        Internal server error. Possible codes:
        - `PAP0500` (InternalServerError): Internal Server Error
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ErrorEnvelope'
              - type: object
                properties:
                  code:
                    type: string
                    enum:
                      - PAP0500
    PdaxError503:
      description: |-
        Service unavailable. Possible codes:
        - `PAP0503` (ServiceUnavailable): Service unavailable
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ErrorEnvelope'
              - type: object
                properties:
                  code:
                    type: string
                    enum:
                      - PAP0503
    PostOrderError400:
      description: |-
        Bad request. Possible codes:
        - `OT010000`: Unauthorized access
        - `OT010001`: Request has been made several times
        - `OT010002`: Failed to acquire database lock
        - `OT010003`: ${resource} cannot be found or has been expire
        - `OT010004`: ${resource} cannot be updated for some reason
        - `OT010005`: Retrieval of ${userid}'s wallet failed
        - `OT010006`: Insufficient ${asset} Balance
        - `OT010007`: ${resource} cannot be created for some reason.
        - `OT010008`: Cannot hold specified amounts
        - `OT010009`: Cannot hold specified amounts
        - `OT010010`: Cannot create specified entries
        - `OT010011`: Cannot create specified entries
        - `OT010012`: Cannot reverse hold specified amounts
        - `OT010013`: Cannot reverse hold specified amounts
        - `OT010014`: Invalid quantity step : ${step}
        - `OT010015`: Cannot correct balances
        - `OT010017`: User not found
        - `OT010018`: Invalid parameters
        - `OT010019`: Minimum quantity limit reached
        - `OT010020`: Maximum quantity limit reached
        - `OT010021`: User not allowed to perform transaction
        - `OT010022`: Withdrawal limit reached
        - `OT010023`: Unsupported Transaction
        - `OT010024`: Crypto Transfer not found
        - `OT010026`: Malformed parameters
        - `OT010027`: Order quantity is less than minimum required quantity
        - `OT010028`: Order quantity is greater than maximum required quantity
        - `OT010029`: Invalid Quantity Step
        - `OT010030`: Invalid Price Step
        - `OT010031`: Balance Transfer Approve Not Allowed
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ErrorEnvelope'
              - type: object
                properties:
                  code:
                    type: string
                    enum:
                      - OT010000
                      - OT010001
                      - OT010002
                      - OT010003
                      - OT010004
                      - OT010005
                      - OT010006
                      - OT010007
                      - OT010008
                      - OT010009
                      - OT010010
                      - OT010011
                      - OT010012
                      - OT010013
                      - OT010014
                      - OT010015
                      - OT010017
                      - OT010018
                      - OT010019
                      - OT010020
                      - OT010021
                      - OT010022
                      - OT010023
                      - OT010024
                      - OT010026
                      - OT010027
                      - OT010028
                      - OT010029
                      - OT010030
                      - OT010031
    PostOrderError500:
      description: |-
        Internal server error. Possible codes:
        - `OT010016`: Asset unavailable
        - `OT010025`: ${resource} is inaccessible
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ErrorEnvelope'
              - type: object
                properties:
                  code:
                    type: string
                    enum:
                      - OT010016
                      - OT010025
    PostFiatOutError400:
      description: |-
        Bad request. Possible codes:
        - `Missing identifier`: identifier is required
        - `Missing sender_first_name`: sender_first_name is required
        - `Missing sender_middle_name`: sender_middle_name is required
        - `Missing sender_last_name`: sender_last_name is required
        - `Missing sender_country_origin`: sender_country_origin is required
        - `Missing source_of_funds`: source_of_funds is required
        - `Missing beneficiary_first_name`: beneficiary_first_name is required
        - `Missing beneficiary_middle_name`: beneficiary_middle_name is required
        - `Missing beneficiary_last_name`: beneficiary_last_name is required
        - `Missing beneficiary_account_name`: beneficiary_account_name is required
        - `Missing beneficiary_account_number`: beneficiary_account_number is required
        - `Missing purpose`: purpose is required
        - `Missing relationship_of_sender_to_beneficiary`: relationship_of_sender_to_beneficiary is required
        - `Missing currency`: Currency only accept PHP
        - `Missing amount`: amount is required and should be greater than 0. Until 2 decimal places
        - `Missing method`: Method {{param.method}} is not supported!
        - `Missing beneficiary_bank_code`: beneficiary_bank_code is required
        - `Invalid sender_country_origin`: sender_country_origin is not valid, Accepted value are:  [List of countries]
        - `Invalid sender_nationality`: sender_nationality is not valid. Accepted value are:  [List of countries]
        - `Invalid sender_country`: sender_country is not valid, Accepted value are:  [List of countries]
        - `Invalid beneficiary_country`: beneficiary_country is not valid, Accepted value are:  [List of countries]
        - `Invalid beneficiary_nationality`: beneficiary_nationality is not valid, Accepted value are:  [List of countries]
        - `Invalid sender_phone_number`: sender_phone_number is not valid, accept numeric only, no + symbol allowed or special characters
        - `Invalid sender DOB`: sender_dob is not valid, error: Please use correct format mm-dd-yyyy
        - `Invalid sender_email`: sender_email is not valid.
        - `Invalid source_of_funds`: source_of_funds is not valid, Accepted value are: Compensation, Sale/Income from Property, Business Income, Pension/Benefit from the Government, Gift/Donation, etc.
        - `Invalid sex`: beneficiary_sex is not valid, Accepted value are: Male, Female
        - `Invalid sender_zip_code`: sender_zip_code is not valid
        - `Invalid beneficiary_zip_code`: beneficiary_zip_code is not valid
        - `Invalid beneficiary_phone_number`: beneficiary_phone_number is not valid, accept numeric only, no + symbol allowed or special characters
        - `Invalid beneficiary DOB`: beneficiary_dob is not valid, error: Please use correct format mm-dd-yyyy
        - `Invalid purpose`: purpose is not valid, Accepted value are: Business Expense/Employee Remittance, Business Transaction, Gift, Loan, Donation of Financial Aid, etc.
        - `Invalid relationship_of_sender_to_beneficiary`: relationship_of_sender_to_beneficiary is not valid, Accepted value are: Spouse/Partner, Family, Acquaintance, Colleague, Business, Myself
        - `Invalid currency`: Currency only accept PHP
        - `Invalid amount`: amount is required and should be greater than 0. Until 2 decimal places
        - `Invalid fee_type`: fee_type is not valid, Accepted value are: Sender, Beneficiary
        - `Invalid method`: Method {{param.method}} is not supported!
        - `Invalid beneficiary_bank_code`: Bank code {{param.beneficiary_bank_code}} is not valid
        - `Identifier previously used. Identifier value should be unique for each request.`: Transaction identifier {{param.identity}} is already existing!
        - `Required field for amount >= 50k PHP`: Must provide either Sender Address Information or Sender National Identity Number or Sender Date Of Birth and Sender Place of Birth for amount >= 50,000 PHP
        - `Amount exceeds the maximum for PAY-TO-ACCOUNT-REAL-TIME method`: Could not process real-time payment with amount greater than 50,000 PHP
        - `Maximum Limit (UBP)`: Could not process ubp/pesonet payment with amount greater than 10,000,000 PHP
        - `Amount exceeds the maximum for PAY-TO-ACCOUNT-NON-REAL-TIME method`: Could not process ubp/pesonet payment with amount greater than 10,000,000 PHP
        - `Account has insufficient funds for the request`: There is insufficient funds in your account. Top-up your account and try again.
        - `Unauthorized`: Invalid Session
        - ``: Amount is below the minimum for PAY-TO-ACCOUNT-REAL-TIME or PAY-TO-ACCOUNT-NON-REAL-TIME methods
        - ``: User is blocked from withdrawing
        - ``: Chosen bank is currently disabled or under maintenance and method is PAY-TO-ACCOUNT-REAL-TIME
        - ``: Chosen bank is currently disabled or under maintenance and method is PAY-TO-ACCOUNT-NON-REAL-TIME
        - ``: Chosen bank is UnionBank and UnionBank is currently disabled or under maintenance
      content:
