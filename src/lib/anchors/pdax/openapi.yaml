webhooks:
  crypto_transactions:
    post:
      summary: Webhook Events for Crypto Transactions
      operationId: crypto_transactions_webhook
      description:
        PDAX delivers this payload to your registered webhook endpoint when a crypto transaction event occurs.
        Register your URL via `POST /pdax-institution/v1/config/webhook` to start receiving.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CryptoWebhookEvent'
      responses:
        '200':
          description: Webhook acknowledged
  fiat_transactions:
    post:
      summary: Webhook Events for Fiat Transactions
      operationId: fiat_transactions_webhook
      description:
        PDAX delivers this payload to your registered webhook endpoint when a fiat transaction event occurs. Register
        your URL via `POST /pdax-institution/v1/config/webhook` to start receiving.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FiatWebhookEvent'
      responses:
        '200':
          description: Webhook acknowledged
components:
  securitySchemes:
    bearerAuth:
      type: apiKey
      in: header
      name: access_token
      description: JWT access token from the login endpoint
    idToken:
      type: apiKey
      in: header
      name: id_token
      description: JWT identity token from the login endpoint
  schemas:
    SuccessEnvelope:
      type: object
      description:
        Standard PDAX success response envelope. Every successful response wraps its payload in this shape. Endpoints
        override the `data` field's type via `allOf` — single-object endpoints set it to a typed object, list endpoints set
        it to a typed array.
      properties:
        status:
          type: string
          example: success
        data:
          description: Endpoint-specific payload. See the per-endpoint response schema for the actual shape (object or array).
      required:
        - data
        - status
    ErrorEnvelope:
      type: object
      description:
        Standard PDAX error response envelope. Specific endpoints constrain the `code` field to a known enum via
        `allOf` in their response components.
      properties:
        status:
          type: string
          example: error
        code:
          type: string
          description: PDAX-assigned machine-readable error code.
        message:
          type: string
          description: Human-readable error message.
      required:
        - code
        - message
