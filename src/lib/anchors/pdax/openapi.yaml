openapi: 3.2.0
info:
  title: PDAX Institutions API
  description: PDAX API for Institutions - fiat/crypto conversion, deposits, withdrawals, and balance management.
  version: 1.0.0
  license:
    name: Proprietary
servers:
  - url: https://services.pdax.ph/api/pdax-api
    description: Production
  - url: https://stage.services.sandbox.pdax.ph/api/pdax-api
    description: Stage / Sandbox
security:
  - bearerAuth: []
    idToken: []
components:
  securitySchemes:
    bearerAuth:
      type: apiKey
      in: header
      name: access_token
      description: JWT access token from the login endpoint
    idToken:
      type: apiKey
      in: header
      name: id_token
      description: JWT identity token from the login endpoint
tags:
  - name: Authentication
  - name: Balances
  - name: Deposit and Withdrawal check
  - name: Funding
  - name: Trade
  - name: Webhook
  - name: Withdrawals
paths:
  /pdax-institution/v1/login:
    post:
      summary: POST Login
      tags:
        - Authentication
      operationId: post_login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  description: Email address of PDAX account
                password:
                  type: string
                  description: Password of PDAX account
      responses:
        '200':
          description: Schema of Response Payload (Without MFA Setup)
          content:
            application/json:
              schema:
                type: object
                properties:
                  email:
                    type: string
                    description: Email address of PDAX account
                  username:
                    type: string
                    description: ID number of PDAX account
                  groups:
                    type: array
                    description: List of groups user belongs to
                  token_type:
                    type: string
                    description: Type of authentication token (e.g., "Bearer")
                  preferred_mfa:
                    type: string
                    description: MFA preference status (e.g., "NOT_SET", "SOFTWARE_TOKEN_MFA")
                  expiry:
                    type: number
                    description: Token validity period in seconds
                  access_token:
                    type: string
                    description: JWT token for API authorization
                  id_token:
                    type: string
                    description: JWT token for user identity
                  refresh_token:
                    type: string
                    description: Token to refresh authentication without reauthentication
        '201':
          description: Schema of Response Payload (With MFA Setup)
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    description: Response code from authentication service
                  message:
                    type: string
                    description: Descriptive message about the MFA challenge
                  challenge_name:
                    type: string
                    description: Type of challenge required (e.g., "SOFTWARE_TOKEN_MFA")
                  session:
                    type: string
                    description: Session token for completing the MFA challenge
        '401':
          description: Unauthorized - invalid or expired token
  /pdax-institution/v1/login/otp:
    post:
      summary: POST OTP
      tags:
        - Authentication
      operationId: post_otp
      description: This endpoint is required if you enable MFA on your account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session:
                  type: string
                  description: MFA session token
                username:
                  type: string
                  description: Email address of PDAX account
                otp:
                  type: string
                  description: One-time password code
      responses:
        '200':
          description: Schema of Response Payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  email:
                    type: string
                    description: Email address of PDAX account
                  username:
                    type: string
                    description: ID number of PDAX account
                  groups:
                    type: array
                    description: List of groups user belongs to
                  token_type:
                    type: string
                    description: Type of authentication token (e.g., "Bearer")
                  preferred_mfa:
                    type: string
                    description: MFA preference status (e.g., "SOFTWARE_TOKEN_MFA")
                  expiry:
                    type: number
                    description: Token validity period in seconds
                  access_token:
                    type: string
                    description: JWT token for API authorization
                  id_token:
                    type: string
                    description: JWT token for user identity
                  refresh_token:
                    type: string
                    description: Token to refresh authentication without reauthentication
        '401':
          description: Unauthorized - invalid or expired token
  /pdax-institution/v1/refresh-token:
    put:
      summary: PUT Refresh Token
      tags:
        - Authentication
      operationId: put_refresh_token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  description: Email address of PDAX account
                refreshToken:
                  type: string
                  description: Token for refresh session
      responses:
        '200':
          description: Schema of Response Payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  email:
                    type: string
                    description: Email address of PDAX account
                  username:
                    type: string
                    description: ID number of PDAX account
                  groups:
                    type: array
                    description: List of groups user belongs to
                  token_type:
                    type: string
                    description: Type of authentication token (e.g., "Bearer")
                  preferred_mfa:
                    type: string
                    description: MFA preference status (e.g., "NOT_SET")
                  expiry:
                    type: number
                    description: Token validity period in seconds
                  access_token:
                    type: string
                    description: JWT token for API authorization
                  id_token:
                    type: string
                    description: JWT token for user identity
                  refresh_token:
                    type: string
                    description: Token to refresh authentication without reauthentication
        4XX:
          description: 'Error responses


            - `PAP0400` (400): Bad request

            - `PAP0401` (401): Unauthorize

            - `PAP0500` (500): Internal Server Error

            - `PAP0503` (503): Service unavailable'
        '401':
          description: Unauthorized - invalid or expired token
